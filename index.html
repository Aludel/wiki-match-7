<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的学习 Wiki</title>
<script>
  (function(){
    try{ var t=localStorage.getItem('wikiTheme'); if(!t) t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'; document.documentElement.setAttribute('data-theme',t); }
    catch(e){ document.documentElement.setAttribute('data-theme','light'); }
  })();
</script>
<style>
  :root[data-theme="light"]{
    --bg:#f5f6fb; --bg-grad1:#eef1ff; --bg-grad2:#fdf2f8;
    --panel:#ffffff; --panel-2:#fbfcfe; --panel-soft:#f3f5fb;
    --ink:#1c2230; --ink-soft:#3a4256; --muted:#6b7488; --faint:#9aa3b5;
    --accent:#6366f1; --accent-2:#8b5cf6; --accent-ink:#4f46e5; --accent-soft:#eef0ff;
    --line:#e6e9f2; --line-soft:#eef1f7; --code-bg:#0f172a; --code-ink:#e6edf8; --code-line:#1e293b;
    --shadow:0 1px 2px rgba(20,30,60,.04), 0 8px 28px rgba(20,30,60,.07); --shadow-sm:0 1px 3px rgba(20,30,60,.07);
    --green:#16a34a; --red:#e11d48; --red-soft:#ffe4e6; --ring:rgba(99,102,241,.28);
    --mark:#fde68a; --mark-ink:#7c4a03; --hm0:#e9ecf2; --hm1:#c7d2fe; --hm2:#a5b4fc; --hm3:#818cf8; --hm4:#4f46e5;
  }
  :root[data-theme="dark"]{
    --bg:#0c0f16; --bg-grad1:#11162400; --bg-grad2:#0c0f1600;
    --panel:#141923; --panel-2:#11151e; --panel-soft:#1a2030;
    --ink:#e8ecf5; --ink-soft:#c2cad8; --muted:#8b95a8; --faint:#6b7488;
    --accent:#818cf8; --accent-2:#a78bfa; --accent-ink:#a5b0ff; --accent-soft:rgba(129,140,248,.16);
    --line:#242b39; --line-soft:#1c2230; --code-bg:#0a0d14; --code-ink:#d8e2f2; --code-line:#1c2433;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35); --shadow-sm:0 1px 3px rgba(0,0,0,.35);
    --green:#34d399; --red:#fb7185; --red-soft:rgba(251,113,133,.16); --ring:rgba(129,140,248,.35);
    --mark:#facc15; --mark-ink:#1c1400; --hm0:#1b2230; --hm1:#312e81; --hm2:#4f46e5; --hm3:#818cf8; --hm4:#c7d2fe;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; line-height:1.78; font-size:15.5px; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; transition:background .35s ease, color .35s ease;}
  #wallLayer{position:fixed; inset:0; z-index:-3; background-size:cover; background-position:center; transition:.4s;}
  #wallDim{position:fixed; inset:0; z-index:-2; background:var(--bg); transition:.4s;}
  body::before{content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; background:radial-gradient(900px 500px at 12% -8%, var(--bg-grad1), transparent 60%),radial-gradient(800px 480px at 100% 0%, var(--bg-grad2), transparent 55%);}
  ::selection{background:var(--accent-soft); color:var(--accent-ink);}
  *::-webkit-scrollbar{width:10px; height:10px;} *::-webkit-scrollbar-thumb{background:var(--line); border-radius:20px; border:2px solid transparent; background-clip:padding-box;} *::-webkit-scrollbar-thumb:hover{background:var(--faint);}
  mark{background:var(--mark); color:var(--mark-ink); border-radius:3px; padding:0 2px;}

  header.top{display:flex; align-items:center; gap:9px; padding:11px 18px; background:color-mix(in srgb, var(--panel) 84%, transparent); backdrop-filter:saturate(160%) blur(12px); -webkit-backdrop-filter:saturate(160%) blur(12px); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:40;}
  .menu-btn{display:none; background:none; border:none; cursor:pointer; font-size:20px; color:var(--ink); padding:4px 6px; border-radius:8px;}
  .menu-btn:hover{background:var(--panel-soft);}
  .logo{font-weight:800; font-size:16px; white-space:nowrap; display:flex; align-items:center; gap:9px;}
  .logo .mark{width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 4px 12px var(--ring);}
  .logo .txt{background:linear-gradient(120deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .logo .txt b{color:var(--ink); font-weight:800;}
  .spacer{flex:1}
  .searchbox{position:relative; flex:1; max-width:380px;}
  .searchbox svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint);}
  .searchbox input{width:100%; padding:9px 14px 9px 38px; border:1px solid var(--line); border-radius:11px; font-size:14px; background:var(--panel-2); color:var(--ink); transition:.18s;}
  .searchbox input::placeholder{color:var(--faint);}
  .searchbox input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 4px var(--ring); background:var(--panel);}
  .results{position:absolute; top:46px; left:0; right:0; background:var(--panel); border:1px solid var(--line); border-radius:13px; box-shadow:var(--shadow); padding:6px; max-height:60vh; overflow-y:auto; display:none; z-index:50;}
  .results.show{display:block;}
  .res{display:block; padding:9px 12px; border-radius:9px; cursor:pointer; text-decoration:none; color:var(--ink);}
  .res:hover,.res.sel{background:var(--accent-soft);}
  .res .rt{font-weight:650; font-size:14px; display:flex; align-items:center; gap:8px;}
  .res .rc{font-size:11px; color:var(--accent-ink); background:var(--accent-soft); padding:1px 8px; border-radius:999px;}
  .res .rs{font-size:12.5px; color:var(--muted); margin-top:2px; line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .res-empty{padding:14px; color:var(--muted); font-size:13px; text-align:center;}
  .iconbtn{width:38px; height:38px; flex:0 0 38px; border:1px solid var(--line); border-radius:11px; background:var(--panel-2); cursor:pointer; display:grid; place-items:center; font-size:15px; color:var(--ink); transition:.18s;}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow-sm);}
  .btn-primary{font-size:13.5px; font-weight:650; color:#fff; padding:9px 15px; border-radius:11px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 4px 14px var(--ring); transition:.18s; white-space:nowrap;}
  .btn-primary:hover{filter:brightness(1.06); transform:translateY(-1px);}

  .sidebar-toggle{flex:0 0 38px;}
  .wrap{display:flex; flex:1; min-height:0; position:relative;}
  nav.side{transition:width .24s cubic-bezier(.4,0,.2,1), flex-basis .24s cubic-bezier(.4,0,.2,1), padding .24s, opacity .2s;}
  .wrap.nav-hidden nav.side{width:0; flex-basis:0; padding-left:0; padding-right:0; opacity:0; overflow:hidden; border-right:none; pointer-events:none;}
  .scrim{display:none; position:fixed; inset:0; background:rgba(8,10,18,.5); z-index:29;}
  nav.side{width:280px; flex:0 0 280px; overflow-y:auto; padding:18px 12px 50px; border-right:1px solid var(--line); background:color-mix(in srgb,var(--panel-2) 92%, transparent);}
  nav.side .cat{font-size:11.5px; letter-spacing:.09em; color:var(--faint); text-transform:uppercase; margin:18px 12px 6px; font-weight:800; display:flex; align-items:center; gap:7px;}
  nav.side .cat::before{content:""; width:6px; height:6px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2));}
  nav.side a.item{position:relative; display:flex; align-items:center; gap:9px; padding:8px 13px; margin:2px 0; color:var(--ink-soft); text-decoration:none; border-radius:10px; font-size:14px; cursor:pointer; transition:.15s; border:1px solid transparent;}
  nav.side a.item .dot{width:6px; height:6px; border-radius:50%; background:var(--faint); flex:0 0 6px; transition:.15s;}
  nav.side a.item:hover{background:var(--panel-soft); color:var(--ink);} nav.side a.item:hover .dot{background:var(--accent);}
  nav.side a.item.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:650; border-color:color-mix(in srgb, var(--accent) 22%, transparent);}
  nav.side a.item.active .dot{background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 0 0 3px var(--ring);}
  nav.side .empty{color:var(--muted); font-size:13px; padding:12px 14px;}
  main.content{flex:1; min-width:0; overflow-y:auto; padding:34px 52px 110px; scroll-behavior:smooth;}
  article{max-width:800px; margin:0 auto; animation:fade .4s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .reader.hide{display:none;}
  .crumb{color:var(--muted); font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .crumb .chip{background:var(--accent-soft); color:var(--accent-ink); padding:2px 10px; border-radius:999px; font-weight:650;}
  article h1{font-size:30px; font-weight:820; margin:4px 0 8px; line-height:1.28; letter-spacing:-.01em;}
  .meta{color:var(--faint); font-size:12.5px; margin-bottom:14px;}
  .page-actions{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
  article h2{font-size:21px; font-weight:760; margin:34px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;}
  article h2::before{content:""; width:4px; height:18px; border-radius:3px; background:linear-gradient(180deg,var(--accent),var(--accent-2));}
  article h3{font-size:17px; font-weight:720; margin:24px 0 8px; color:var(--accent-ink);}
  article h4{font-size:15.5px; font-weight:720; margin:20px 0 6px; color:var(--ink); display:flex; align-items:center; gap:7px;}
  article h4::before{content:""; width:7px; height:7px; border-radius:2px; background:var(--accent-2); transform:rotate(45deg);}
  article h5{font-size:14px; font-weight:740; margin:16px 0 5px; color:var(--ink-soft); text-transform:none; letter-spacing:.01em;}
  article h6{font-size:13px; font-weight:700; margin:14px 0 4px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
  article p{margin:12px 0;} article ul,article ol{padding-left:22px; margin:12px 0;} article li{margin:6px 0;}
  article ul li::marker{color:var(--accent);} article ol li::marker{color:var(--accent); font-weight:700;}
  article blockquote{margin:18px 0; padding:14px 18px 14px 20px; background:var(--accent-soft); border-radius:0 12px 12px 0; color:var(--ink-soft); border-left:4px solid var(--accent);}
  article blockquote p{margin:4px 0;}
  article code.inline{background:var(--accent-soft); color:var(--accent-ink); padding:2px 7px; border-radius:6px; font-size:13.5px; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-weight:600;}
  article pre.code{position:relative; background:var(--code-bg); color:var(--code-ink); padding:36px 18px 16px; border-radius:14px; overflow-x:auto; font-size:13.5px; line-height:1.7; margin:18px 0; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; border:1px solid var(--code-line); box-shadow:var(--shadow-sm);}
  article pre.code::before{content:""; position:absolute; top:14px; left:16px; width:11px; height:11px; border-radius:50%; background:#ff5f57; box-shadow:18px 0 0 #febc2e, 36px 0 0 #28c840;}
  article iframe.embed{width:100%; min-height:200px; border:none; border-radius:0; box-shadow:none; background:transparent; margin:10px 0; display:block;}
  article.embed-page{max-width:100%;}
  article a{color:var(--accent-ink); text-decoration:none; border-bottom:1.5px solid transparent; transition:.15s;}
  article a:hover{border-bottom-color:var(--accent);}
  article a.wlink{background:var(--accent-soft); padding:1.5px 8px; border-radius:7px; font-weight:600; border-bottom:none;}
  article a.wlink:hover{filter:brightness(.97); box-shadow:0 0 0 3px var(--ring);}
  article a.wlink.missing{background:var(--red-soft); color:var(--red);} article a.wlink.missing::after{content:" ✚"; font-size:11px;}
  article hr{border:none; border-top:1px dashed var(--line); margin:28px 0;}
  article table{border-collapse:separate; border-spacing:0; width:100%; margin:18px 0; font-size:14px; border:1px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm);}
  article th{background:var(--accent-soft); color:var(--accent-ink); padding:10px 14px; text-align:left; font-weight:700; border-bottom:1px solid var(--line);}
  article td{padding:9px 14px; border-bottom:1px solid var(--line-soft);}
  article tbody tr:nth-child(even){background:var(--panel-soft);} article tbody tr:last-child td{border-bottom:none;} article tbody tr:hover{background:var(--accent-soft);}
  .backlinks{margin-top:46px; padding-top:20px; border-top:1px solid var(--line);}
  .backlinks h3{font-size:13px; color:var(--muted); margin:0 0 10px; font-weight:700;}
  .backlinks a{display:inline-flex; align-items:center; gap:6px; margin:0 8px 8px 0; font-size:13px; color:var(--ink-soft); text-decoration:none; background:var(--panel); border:1px solid var(--line); padding:6px 12px; border-radius:999px; transition:.15s; box-shadow:var(--shadow-sm);}
  .backlinks a::before{content:"🔗"; font-size:11px;} .backlinks a:hover{border-color:var(--accent); color:var(--accent-ink); transform:translateY(-1px);}

  .activity{max-width:880px; margin:0 auto; animation:fade .4s ease;}
  .activity h1{font-size:26px; font-weight:800; margin:0 0 6px;}
  .activity .sub{color:var(--muted); font-size:13.5px; margin-bottom:24px;}
  .hm-card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin:0 0 22px; box-shadow:var(--shadow-sm); overflow-x:auto;}
  .hm-card h3{margin:0 0 4px; font-size:16px; font-weight:740;}
  .hm-card .hint{color:var(--muted); font-size:12.5px; margin:0 0 14px;}
  .hm-stats{display:flex; gap:22px; flex-wrap:wrap; margin:0 0 16px;}
  .hm-stat b{display:block; font-size:22px; font-weight:800; color:var(--accent-ink); line-height:1.1;}
  .hm-stat span{font-size:12px; color:var(--muted);}
  .hm-months{display:flex; gap:3px; margin:0 0 4px 0; padding-left:26px; font-size:10px; color:var(--faint);}
  .hm-body{display:flex; gap:8px;}
  .hm-days{display:grid; grid-template-rows:repeat(7,12px); gap:3px; font-size:9px; color:var(--faint);}
  .hm-days span{height:12px; line-height:12px;}
  .hm-grid{display:flex; gap:3px;}
  .hm-col{display:grid; grid-template-rows:repeat(7,12px); gap:3px;}
  .hm-cell{width:12px; height:12px; border-radius:3px; background:var(--hm0);}
  .hm-cell[data-l="1"]{background:var(--hm1);} .hm-cell[data-l="2"]{background:var(--hm2);} .hm-cell[data-l="3"]{background:var(--hm3);} .hm-cell[data-l="4"]{background:var(--hm4);}
  .hm-cell.empty{background:transparent;}
  .hm-legend{display:flex; align-items:center; gap:6px; margin-top:12px; font-size:11px; color:var(--muted); justify-content:flex-end;}
  .hm-legend i{width:12px; height:12px; border-radius:3px; display:inline-block;}

  .overlay{position:fixed; inset:0; background:rgba(8,10,18,.55); z-index:70; display:none; backdrop-filter:blur(2px);}
  .overlay.show{display:block;}
  .drawer{position:fixed; top:0; right:0; bottom:0; width:380px; max-width:92vw; background:var(--panel); border-left:1px solid var(--line); z-index:71; transform:translateX(104%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:var(--shadow);}
  .drawer.show{transform:none;}
  .drawer .dh{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line);}
  .drawer .dh h3{margin:0; font-size:16px; font-weight:740;}
  .drawer .db{padding:18px 20px; overflow-y:auto;}
  .field{margin-bottom:18px;} .field label{display:block; font-size:13px; font-weight:650; color:var(--ink-soft); margin-bottom:8px;}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{font-size:13px; padding:7px 12px; border-radius:9px; border:1px solid var(--line); background:var(--panel-2); color:var(--ink-soft); cursor:pointer;}
  .seg button.on{background:var(--accent-soft); color:var(--accent-ink); border-color:color-mix(in srgb,var(--accent) 30%,transparent); font-weight:650;}
  .presets{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .preset{height:46px; border-radius:10px; cursor:pointer; border:2px solid transparent; background-size:cover; background-position:center;}
  .preset.on{border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .field input[type=text]{width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:9px; background:var(--panel-2); color:var(--ink); font-size:13.5px;}
  .field input[type=text]:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .field input[type=range]{width:100%; accent-color:var(--accent);}
  .rangeval{font-size:12px; color:var(--muted); float:right;}

  .modal{position:fixed; inset:0; background:rgba(8,10,18,.55); z-index:80; display:none; padding:3vh 2vw; backdrop-filter:blur(2px);}
  .modal.show{display:flex;}
  .editor{margin:auto; width:min(1100px,94vw); height:88vh; min-width:360px; min-height:320px; max-width:97vw; max-height:96vh; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden; resize:both;}
  .editor.max{width:97vw !important; height:96vh !important;}
  .editor .epane{flex:1 1 auto; min-height:0;}
  .editor .eh{display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
  .editor .eh input.t{flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:16px; font-weight:700; background:var(--panel-2); color:var(--ink);}
  .editor .eh input.c{width:150px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:13px; background:var(--panel-2); color:var(--ink);}
  .editor .eh input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .tabs{display:flex; gap:4px; padding:10px 18px 0;}
  .tabs button{font-size:13px; padding:8px 14px; border:none; background:none; color:var(--muted); cursor:pointer; border-radius:9px 9px 0 0; font-weight:650;}
  .tabs button.on{color:var(--accent-ink); background:var(--accent-soft);}
  .toolbar{display:flex; gap:4px; padding:8px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
  .toolbar button{min-width:34px; height:32px; padding:0 9px; border:1px solid var(--line); background:var(--panel-2); border-radius:8px; cursor:pointer; font-size:13px; color:var(--ink); font-weight:650;}
  .toolbar button:hover{border-color:var(--accent); color:var(--accent);}
  .epane{flex:1; overflow:auto; padding:18px 22px;}
  .wysiwyg{min-height:300px; outline:none; line-height:1.75; font-size:15px;}
  .wysiwyg h1{font-size:24px;} .wysiwyg h2{font-size:19px;} .wysiwyg h3{font-size:16px; color:var(--accent-ink);}
  .wysiwyg h4{font-size:15px; font-weight:720;} .wysiwyg h5{font-size:14px; font-weight:740; color:var(--ink-soft);} .wysiwyg h6{font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
  .wysiwyg pre{background:var(--code-bg); color:var(--code-ink); padding:12px 14px; border-radius:10px; font-family:ui-monospace,monospace; font-size:13px; overflow-x:auto;}
  .wysiwyg blockquote{border-left:3px solid var(--accent); padding-left:12px; color:var(--ink-soft); margin:10px 0;}
  .wysiwyg code{background:var(--accent-soft); color:var(--accent-ink); padding:1px 6px; border-radius:5px; font-family:ui-monospace,monospace;}
  .mdsrc{width:100%; min-height:320px; border:none; outline:none; resize:none; background:transparent; color:var(--ink); font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:14px; line-height:1.7;}
  .ef{display:flex; gap:10px; padding:14px 18px; border-top:1px solid var(--line); flex-wrap:wrap; align-items:center;}
  .ef .grow{flex:1}
  .btn-green{font-size:13.5px; font-weight:650; padding:9px 16px; border-radius:11px; background:var(--green); color:#fff; border:none; cursor:pointer; box-shadow:var(--shadow-sm);}
  .btn-green:hover{filter:brightness(1.05); transform:translateY(-1px);}
  .btn-soft{font-size:13.5px; font-weight:600; padding:9px 14px; border-radius:10px; background:var(--accent-soft); color:var(--accent-ink); border:none; cursor:pointer;}
  .btn-ghost{font-size:13.5px; font-weight:600; padding:9px 14px; border-radius:10px; background:var(--panel-soft); color:var(--muted); border:1px solid var(--line); cursor:pointer;} .btn-ghost:hover{color:var(--ink);}
  .btn-danger{font-size:13px; font-weight:600; padding:9px 13px; border-radius:10px; background:var(--red-soft); color:var(--red); border:none; cursor:pointer;}
  .crop-wrap{margin:auto; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:16px 18px; display:flex; flex-direction:column; gap:12px; max-width:96vw; max-height:96vh;}
  .crop-head{display:flex; align-items:center; gap:10px;}
  .crop-hint{font-size:12.5px; color:var(--muted); margin-top:-4px;}
  .crop-stage{position:relative; align-self:center; line-height:0; overflow:hidden; border-radius:10px; touch-action:none; user-select:none;}
  .crop-stage img{display:block; max-width:86vw; max-height:70vh; -webkit-user-drag:none; user-select:none;}
  .crop-box{position:absolute; left:0; top:0; border:2px solid #fff; box-shadow:0 0 0 9999px rgba(8,10,18,.55); cursor:move; box-sizing:border-box; touch-action:none;}
  .crop-h{position:absolute; width:15px; height:15px; background:#fff; border:1.5px solid var(--accent); border-radius:4px; box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .crop-h.nw{left:-8px; top:-8px; cursor:nwse-resize;} .crop-h.ne{right:-8px; top:-8px; cursor:nesw-resize;}
  .crop-h.sw{left:-8px; bottom:-8px; cursor:nesw-resize;} .crop-h.se{right:-8px; bottom:-8px; cursor:nwse-resize;}
  .crop-foot{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .side-tools{display:flex; align-items:center; gap:4px; padding:2px 10px 8px; margin:0 2px 4px; border-bottom:1px solid var(--line-soft);}
  .side-title{font-size:11.5px; letter-spacing:.09em; color:var(--faint); text-transform:uppercase; font-weight:800; flex:1;}
  .side-mini{border:1px solid var(--line); background:var(--panel-2); color:var(--ink-soft); border-radius:7px; font-size:11px; padding:3px 6px; cursor:pointer; line-height:1;}
  .side-mini:hover{border-color:var(--accent); color:var(--accent);}
  .tree-row{position:relative; display:flex; align-items:center; gap:5px; padding:6px 8px; margin:1px 0; border-radius:9px; cursor:pointer; font-size:13.5px; color:var(--ink-soft); border:1px solid transparent; user-select:none;}
  .tree-row:hover{background:var(--panel-soft);}
  .tree-row.folder{font-weight:650; color:var(--ink);}
  .tree-row.note .dot{width:6px; height:6px; border-radius:50%; background:var(--faint); flex:0 0 6px;}
  .tree-row.note:hover .dot{background:var(--accent);}
  .tree-row.note.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:650; border-color:color-mix(in srgb,var(--accent) 22%,transparent);}
  .tree-row.note.active .dot{background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 0 0 3px var(--ring);}
  .tree-row .caret{flex:0 0 14px; width:14px; text-align:center; font-size:10px; color:var(--muted); transition:transform .15s;}
  .tree-row.collapsed .caret{transform:rotate(-90deg);}
  .tree-row .tlabel{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tree-row .tcount{font-size:10.5px; color:var(--faint); background:var(--panel-soft); border-radius:999px; padding:0 7px;}
  .tree-row .tacts{display:none; gap:2px;}
  .tree-row:hover .tacts{display:flex;}
  .tree-row .tacts button{border:none; background:none; cursor:pointer; font-size:11px; padding:2px 3px; border-radius:5px; color:var(--muted);}
  .tree-row .tacts button:hover{background:var(--accent-soft); color:var(--accent-ink);}
  .tree-row.drop-target{background:var(--accent-soft); border-color:var(--accent); box-shadow:0 0 0 2px var(--ring);}
  #treeRoot.drop-root{outline:2px dashed var(--accent); outline-offset:-4px; border-radius:10px;}
  .tree-children{overflow:hidden;}
  .tree-children.hidden{display:none;}
  .ai-field{margin-bottom:14px;} .ai-field label{display:block; font-size:13px; font-weight:650; color:var(--ink-soft); margin-bottom:6px;}
  .ai-field input,.ai-field select,.ai-field textarea{width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:9px; background:var(--panel-2); color:var(--ink); font-size:13.5px; font-family:inherit;}
  .ai-field input:focus,.ai-field select:focus,.ai-field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .ai-acts{display:flex; flex-wrap:wrap; gap:7px;}
  .ai-chip{font-size:13px; padding:7px 12px; border-radius:9px; border:1px solid var(--line); background:var(--panel-2); color:var(--ink-soft); cursor:pointer;}
  .ai-chip.on{background:var(--accent-soft); color:var(--accent-ink); border-color:color-mix(in srgb,var(--accent) 30%,transparent); font-weight:650;}
  .ai-out{white-space:pre-wrap; background:var(--panel-soft); border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:13.5px; max-height:40vh; overflow:auto; line-height:1.7;}
  .ai-atts{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
  .ai-att{display:flex; align-items:center; gap:6px; font-size:12px; background:var(--panel-soft); border:1px solid var(--line); border-radius:8px; padding:4px 8px;}
  .ai-att button{border:none; background:none; color:var(--red); cursor:pointer; font-size:13px;}
  .ai-status{font-size:12.5px; color:var(--muted);}
  #dropZone{position:fixed; inset:0; z-index:95; display:none; align-items:center; justify-content:center; background:color-mix(in srgb, var(--accent) 16%, rgba(8,10,18,.55)); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);}
  #dropZone.show{display:flex;}
  #dropZone .dz-card{pointer-events:none; background:var(--panel); border:3px dashed var(--accent); border-radius:22px; padding:42px 60px; text-align:center; box-shadow:var(--shadow); color:var(--ink); animation:fade .2s ease;}
  #dropZone .dz-ic{font-size:48px; line-height:1;} #dropZone .dz-t{font-size:19px; font-weight:780; margin-top:12px;} #dropZone .dz-s{font-size:13px; color:var(--muted); margin-top:6px;}
  .toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:var(--bg); padding:11px 20px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:.28s; z-index:90; box-shadow:var(--shadow);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  @media(max-width:880px){
    main.content{padding:24px 18px 80px;}
    nav.side{position:fixed; top:0; left:0; bottom:0; z-index:30; transform:translateX(-104%); transition:transform .28s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow);}
    .wrap.open nav.side{transform:none;} .wrap.open .scrim{display:block;}
    .menu-btn{display:grid;} .sidebar-toggle{display:none;} .searchbox{order:5; flex-basis:100%; max-width:none;} header.top{flex-wrap:wrap;}
    .wrap.nav-hidden nav.side{width:280px; flex-basis:280px;}
    article h1{font-size:25px;} .btn-primary span.lbl{display:none;}
  }
</style>
</head>
<body>
<div id="wallLayer"></div><div id="wallDim"></div>
<div id="dropZone"><div class="dz-card"><div class="dz-ic">📥</div><div class="dz-t">松手即可批量导入</div><div class="dz-s">支持 .md / .markdown / .txt（笔记）· .html（页面）· .json（备份）<br>可拖入多个文件或整个文件夹</div></div></div>
<header class="top">
  <button class="menu-btn" aria-label="菜单" onclick="WIKI.toggleNav()">☰</button>
  <button class="iconbtn sidebar-toggle" title="隐藏 / 显示侧边栏" onclick="WIKI.toggleSidebar()">◧</button>
  <div class="logo"><span class="mark">📚</span><span class="txt">我的学习 <b>Wiki</b></span></div>

    <input id="search" type="text" placeholder="搜索标题或内容…" autocomplete="off" oninput="WIKI.onSearch(this.value)" onkeydown="WIKI.searchKey(event)" onfocus="WIKI.onSearch(this.value)">
    <div class="results" id="results"></div>
  </div>
  <div class="spacer"></div>
  <button class="iconbtn" title="活跃度" onclick="WIKI.showActivity()">📊</button>
  <button class="iconbtn" title="壁纸 / 外观" onclick="WIKI.openSettings()">🎨</button>
  <button class="iconbtn" title="AI 设置" onclick="WIKI.openAISettings()">🤖</button>
  <button class="iconbtn" id="themeBtn" title="切换明暗主题" onclick="WIKI.toggleTheme()">🌙</button>
  <button class="iconbtn" title="导出备份" onclick="WIKI.exportData()">⬇</button>
  <button class="iconbtn" title="导入备份" onclick="document.getElementById('importFile').click()">⬆</button>
  <input id="importFile" type="file" accept=".json" style="display:none" onchange="WIKI.importData(this.files[0])">
  <button class="iconbtn" title="导入 HTML 文件为新页面" onclick="document.getElementById('htmlFile').click()">🌐</button>
  <input id="htmlFile" type="file" accept=".html,.htm" style="display:none" onchange="WIKI.importHtmlFile(this.files[0]); this.value='';">
  <button class="iconbtn" title="批量导入 Markdown 文件" onclick="document.getElementById('mdFiles').click()">📥</button>
  <input id="mdFiles" type="file" accept=".md,.markdown,.txt,text/markdown" multiple style="display:none" onchange="WIKI.importMarkdownFiles(this.files); this.value='';">
  <button class="btn-primary" onclick="WIKI.openEditor(null)">＋<span class="lbl"> 新建</span></button>
</header>

<div class="wrap" id="wrap">
  <div class="scrim" onclick="WIKI.toggleNav(false)"></div>
  <nav class="side" id="sidebar">
    <div class="side-tools">
      <span class="side-title">文件结构</span>
      <button class="side-mini" title="新建文件夹" onclick="WIKI.newFolder()">📁＋</button>
      <button class="side-mini" title="全部折叠" onclick="WIKI.collapseAll(true)">⊟</button>
      <button class="side-mini" title="全部展开" onclick="WIKI.collapseAll(false)">⊞</button>
    </div>
    <div id="treeRoot"></div>
  </nav>
  <main class="content" id="main">
    <article id="reader" class="reader">
      <div class="crumb" id="crumb"></div>
      <h1 id="pgTitle"></h1>
      <div class="meta" id="pgMeta"></div>
      <div class="page-actions">
        <button class="btn-soft" onclick="WIKI.openEditor(WIKI.cur())">✎ 编辑</button>
        <button class="btn-soft" onclick="WIKI.openAIOrganize()">✨ AI 整理</button>
      </div>
      <div id="pgBody"></div>
      <div class="backlinks" id="backlinks"></div>
    </article>
    <div class="activity" id="activity" style="display:none"></div>
  </main>
</div>

<div class="overlay" id="ovl" onclick="WIKI.closeSettings()"></div>
<div class="drawer" id="drawer">
  <div class="dh"><h3>🎨 外观与壁纸</h3><button class="iconbtn" onclick="WIKI.closeSettings()">✕</button></div>
  <div class="db">
    <div class="field"><label>壁纸来源</label>
      <div class="seg" id="wallType">
        <button data-t="none" onclick="WIKI.setWallType('none')">无</button>
        <button data-t="preset" onclick="WIKI.setWallType('preset')">预设</button>
        <button data-t="url" onclick="WIKI.setWallType('url')">图片链接</button>
        <button data-t="image" onclick="WIKI.setWallType('image')">本地上传</button>
      </div>
    </div>
    <div class="field" id="presetField"><label>选一张预设</label><div class="presets" id="presets"></div></div>
    <div class="field" id="urlField" style="display:none"><label>图片网址（https://…）</label><input type="text" id="wallUrl" placeholder="粘贴图片链接后按回车" onchange="WIKI.setWallUrl(this.value)"></div>
    <div class="field" id="imgField" style="display:none"><label>从本机选一张图片</label><input type="file" accept="image/*" onchange="WIKI.setWallImage(this.files[0])"></div>
    <div class="field" id="cropField" style="display:none"><button class="btn-soft" onclick="WIKI.openCropper()">✂ 选择 / 裁剪显示区域</button></div>
    <div class="field"><label>背景模糊 <span class="rangeval" id="blurVal">0px</span></label><input type="range" id="blur" min="0" max="24" value="0" oninput="WIKI.setBlur(this.value)"></div>
    <div class="field"><label>背景压暗 / 提亮（保证文字清晰）<span class="rangeval" id="dimVal">82%</span></label><input type="range" id="dim" min="0" max="100" value="82" oninput="WIKI.setDim(this.value)"></div>
    <div class="field"><button class="btn-ghost" onclick="WIKI.resetWall()">恢复默认背景</button></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="editor">
    <div class="eh">
      <input class="t" id="edTitle" placeholder="页面标题（其他页面用 [[标题]] 链接到它）">
      <input class="c" id="edCat" placeholder="分类">
      <button class="iconbtn" id="edMaxBtn" title="最大化 / 还原" onclick="WIKI.toggleEditorMax()" style="flex:0 0 38px">⛶</button>
    </div>
    <div class="tabs">
      <button id="tabVis" class="on" onclick="WIKI.switchTab('vis')">✦ 可视化</button>
      <button id="tabMd" onclick="WIKI.switchTab('md')">⌗ Markdown</button>
    </div>
    <div class="toolbar" id="toolbar">
      <button title="加粗" onclick="WIKI.fmt('bold')"><b>B</b></button>
      <button title="斜体" onclick="WIKI.fmt('italic')"><i>I</i></button>
      <button title="标题2" onclick="WIKI.fmtBlock('H2')">H2</button>
      <button title="标题3" onclick="WIKI.fmtBlock('H3')">H3</button>
      <button title="标题4" onclick="WIKI.fmtBlock('H4')">H4</button>
      <button title="标题5" onclick="WIKI.fmtBlock('H5')">H5</button>
      <button title="标题6" onclick="WIKI.fmtBlock('H6')">H6</button>
      <button title="正文" onclick="WIKI.fmtBlock('P')">¶</button>
      <button title="无序列表" onclick="WIKI.fmt('insertUnorderedList')">• 列表</button>
      <button title="有序列表" onclick="WIKI.fmt('insertOrderedList')">1. 列表</button>
      <button title="引用" onclick="WIKI.fmtBlock('BLOCKQUOTE')">❝ 引用</button>
      <button title="行内代码" onclick="WIKI.wrapCode()">&lt;/&gt; 代码</button>
      <button title="链接" onclick="WIKI.makeLink()">🔗 链接</button>
      <button title="粘贴 HTML 转为笔记内容" onclick="WIKI.openHtmlImport()">⤵ HTML</button>
    </div>
    <div class="epane">
      <div class="wysiwyg" id="wys" contenteditable="true"></div>
      <textarea class="mdsrc" id="mdsrc" style="display:none" placeholder="在此用 Markdown 书写…"></textarea>
    </div>
    <div class="ef">
      <button class="btn-green" onclick="WIKI.saveEdit()">✓ 保存</button>
      <span class="grow"></span>
      <button class="btn-danger" id="edDelete" onclick="WIKI.deleteCurrent()">🗑 删除本页</button>
      <button class="btn-ghost" onclick="WIKI.closeEditor()">取消</button>
    </div>
  </div>
</div>
<div class="modal" id="cropModal" style="z-index:86; padding:2vh 2vw">
  <div class="crop-wrap">
    <div class="crop-head"><b style="font-size:15px">✂ 选择要用作壁纸的区域</b><span style="flex:1"></span><button class="iconbtn" onclick="WIKI.closeCropper()" style="flex:0 0 38px">✕</button></div>
    <div class="crop-hint">拖动方框移动位置，拖动四角调整大小；方框内即为最终显示的壁纸区域。</div>
    <div class="crop-stage" id="cropStage">
      <img id="cropImg" alt="">
      <div class="crop-box" id="cropBox">
        <i class="crop-h nw" data-h="nw"></i><i class="crop-h ne" data-h="ne"></i>
        <i class="crop-h sw" data-h="sw"></i><i class="crop-h se" data-h="se"></i>
      </div>
    </div>
    <div class="crop-foot">
      <button class="btn-green" onclick="WIKI.applyCrop()">✓ 应用裁剪</button>
      <button class="btn-soft" onclick="WIKI.cropReset()">⟳ 重置选框</button>
      <button class="btn-soft" onclick="WIKI.cropWhole()">使用整张图</button>
      <span style="flex:1"></span>
      <button class="btn-ghost" onclick="WIKI.closeCropper()">取消</button>

<div class="modal" id="htmlImportModal" style="z-index:85">

    <div class="epane">

<div class="modal" id="aiOrganizeModal" style="z-index:84">

    </div>
    <div class="ef">
      <button class="btn-green" id="aiRunBtn" onclick="WIKI.runAIOrganize()">▶ 运行</button>

      <button class="btn-soft" id="aiApplyReplace" style="display:none" onclick="WIKI.aiApply('replace')">替换正文</button>
      <button class="btn-soft" id="aiApplyPrepend" style="display:none" onclick="WIKI.aiApply('prepend')">插入开头</button>
      <button class="btn-soft" id="aiApplyCat" style="display:none" onclick="WIKI.aiApply('cat')">采用分类</button>
      <button class="btn-ghost" onclick="WIKI.closeAIOrganize()">关闭</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='myStudyWiki_v1', VIS_KEY='wikiVisits', WALL_KEY='wikiWall';
const WIKI=(function(){
  let notes={}, current=null, view='note', edTab='vis', editingId=null;

  function load(){ try{ const raw=localStorage.getItem(KEY); if(raw){ notes=JSON.parse(raw); if(!notes['os-sem-interactive']){ const now=new Date().toISOString().slice(0,16).replace('T',' '); notes['os-sem-interactive']={id:'os-sem-interactive',title:'信号量交互式学习指南',category:'操作系统',updated:now,body:"# 信号量交互式学习指南（OSTEP 第31章）\n\n> 下面原样嵌入了《信号量学习指南》，保留全部图示、配色与交互模拟器，渲染与原文件完全一致。若下方未显示，请确认 `信号量学习指南.html` 与本文件在同一文件夹。\n\n@embed 信号量学习指南.html"}; persist(); } return; } }catch(e){} notes=seed(); persist(); }
  function persist(){ try{ localStorage.setItem(KEY,JSON.stringify(notes)); }catch(e){ toast('⚠ 浏览器存储写入失败，建议导出备份'); } }
  function slug(t){ return (t||'').trim().toLowerCase().replace(/\s+/g,'-').replace(/[^\w一-龥\-]/g,'')||('p'+Date.now()); }
  function idByTitle(title){ const t=(title||'').trim(); for(const id in notes){ if(notes[id].title.trim()===t) return id; } return null; }

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    const BT=String.fromCharCode(96);
    const parts=s.split(new RegExp('('+BT+'[^'+BT+']+'+BT+')','g'));
    return parts.map(seg=>{
      if(seg.length>=2 && seg[0]===BT && seg[seg.length-1]===BT){ return '<code class="inline">'+esc(seg.slice(1,-1))+'</code>'; }
      let t=esc(seg);
      t=t.replace(/\[\[([^\]]+)\]\]/g,(m,x)=>{ x=x.trim(); const ex=idByTitle(x); return '<a class="wlink'+(ex?'':' missing')+'" data-t="'+x.replace(/"/g,'&quot;')+'" onclick="WIKI.goByTitle(this.dataset.t);return false;">'+x+'</a>'; });
      t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,txt,url)=>'<a href="'+url+'" target="_blank" rel="noopener">'+txt+'</a>');
      t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
      t=t.replace(/(^|[^*])\*([^*]+)\*/g,'$1<i>$2</i>');
      return t;
    }).join('');
  }
  function render(md){
    const lines=(md||'').replace(/\r/g,'').split('\n'); const FENCE=String.fromCharCode(96,96,96);
    let html='', i=0;
    const isTableStart=k=>/\|/.test(lines[k]||'') && /^[\s|:\-]+$/.test(lines[k+1]||'') && (lines[k+1]||'').includes('-');
    while(i<lines.length){
      let ln=lines[i];
      if(ln.indexOf(FENCE)===0){ let buf=[]; i++; while(i<lines.length && lines[i].indexOf(FENCE)!==0){ buf.push(lines[i]); i++; } i++; html+='<pre class="code">'+esc(buf.join('\n'))+'</pre>'; continue; }
      if(/^@embed\s+/.test(ln)){ const src=ln.replace(/^@embed\s+/,'').trim(); html+='<iframe class="embed" src="'+src.replace(/"/g,'%22')+'" loading="lazy"></iframe>'; i++; continue; }
      if(/^@embedhtml\s+/.test(ln)){ const b64=ln.replace(/^@embedhtml\s+/,'').trim(); let doc=''; try{ doc=decodeURIComponent(escape(atob(b64))); }catch(e){ doc=''; } doc+='<style id="__wikiBgKill">:root,html,body{background:transparent !important;background-color:transparent !important;}</style>'; html+='<iframe class="embed" srcdoc="'+doc.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'" sandbox="allow-scripts allow-same-origin allow-popups" loading="lazy"></iframe>'; i++; continue; }
      let h=ln.match(/^(#{1,6})\s+(.*)$/);
      if(h){ const lv=h[1].length; html+='<h'+lv+'>'+inline(h[2])+'</h'+lv+'>'; i++; continue; }
      if(/^---+$/.test(ln.trim())){ html+='<hr>'; i++; continue; }
      if(/^>\s?/.test(ln)){ let buf=[]; while(i<lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; } html+='<blockquote>'+inline(buf.join(' '))+'</blockquote>'; continue; }
      if(isTableStart(i)){ const head=ln.split('|').map(x=>x.trim()).filter(x=>x!==''); i+=2; let rows=[]; while(i<lines.length && lines[i].includes('|')){ rows.push(lines[i].split('|').map(x=>x.trim()).filter(x=>x!=='')); i++; } let t='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'; rows.forEach(r=>{ t+='<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; }); html+=t+'</tbody></table>'; continue; }
      if(/^\s*[-*]\s+/.test(ln)){ let buf=[]; while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; } html+='<ul>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ul>'; continue; }
      if(/^\s*\d+\.\s+/.test(ln)){ let buf=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; } html+='<ol>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ol>'; continue; }
      if(ln.trim()===''){ i++; continue; }
      let buf=[ln]; i++;
      while(i<lines.length && lines[i].trim()!=='' && !/^(#{1,6}\s|>|\s*[-*]\s|\s*\d+\.\s|---+$)/.test(lines[i]) && lines[i].indexOf(FENCE)!==0 && !isTableStart(i)){ buf.push(lines[i]); i++; }
      html+='<p>'+buf.map(inline).join('<br>')+'</p>';
    }
    return html;
  }
  function htmlToMd(root){
    function inlineMd(node){ let s=''; node.childNodes.forEach(n=>{ if(n.nodeType===3){ s+=n.nodeValue; return; } if(n.nodeType!==1) return; const tag=n.nodeName.toLowerCase(), inner=inlineMd(n);
      if(tag==='b'||tag==='strong') s+='**'+inner+'**'; else if(tag==='i'||tag==='em') s+='*'+inner+'*';
      else if(tag==='code') s+=String.fromCharCode(96)+n.textContent+String.fromCharCode(96);
      else if(tag==='a') s+='['+inner+']('+(n.getAttribute('href')||'')+')'; else if(tag==='br') s+='\n'; else s+=inner; }); return s; }
    let out='';
    function block(node){ node.childNodes.forEach(n=>{ if(n.nodeType===3){ const t=n.nodeValue.replace(/\s+/g,' ').trim(); if(t) out+=t+'\n\n'; return; } if(n.nodeType!==1) return; const tag=n.nodeName.toLowerCase();
      if(/^h[1-6]$/.test(tag)) out+='#'.repeat(+tag[1])+' '+inlineMd(n).trim()+'\n\n';
      else if(tag==='ul'){ n.querySelectorAll(':scope > li').forEach(li=>{ out+='- '+inlineMd(li).trim()+'\n'; }); out+='\n'; }
      else if(tag==='ol'){ let k=1; n.querySelectorAll(':scope > li').forEach(li=>{ out+=(k++)+'. '+inlineMd(li).trim()+'\n'; }); out+='\n'; }
      else if(tag==='blockquote'){ out+='> '+inlineMd(n).trim().replace(/\n+/g,' ')+'\n\n'; }
      else if(tag==='pre'){ const F=String.fromCharCode(96,96,96); out+=F+'\n'+n.textContent.replace(/\n+$/,'')+'\n'+F+'\n\n'; }
      else if(tag==='iframe'){ const sd=n.getAttribute('srcdoc'); if(sd!=null){ out+='@embedhtml '+btoa(unescape(encodeURIComponent(sd)))+'\n\n'; } else { out+='@embed '+(n.getAttribute('src')||'')+'\n\n'; } }
      else if(tag==='div'||tag==='p'){ if(n.querySelector&&n.querySelector('iframe')){ block(n); return; } const inner=inlineMd(n).trim(); out+= inner? inner+'\n\n':''; }
      else { const inner=inlineMd(n).trim(); if(inner) out+=inner+'\n\n'; } }); }
    block(root); return out.replace(/\n{3,}/g,'\n\n').trim();
  }

  let selIdx=-1, curResults=[];
  function searchResults(q){ q=(q||'').trim().toLowerCase(); if(!q) return []; const toks=q.split(/\s+/).filter(Boolean); const arr=[];
    Object.values(notes).forEach(n=>{ const tl=n.title.toLowerCase(), bl=(n.body||'').toLowerCase(); let score=0;
      if(tl.includes(q)) score+=120; toks.forEach(t=>{ if(tl.includes(t)) score+=30; let idx=bl.indexOf(t),c=0; while(idx>=0&&c<8){ score+=3; c++; idx=bl.indexOf(t,idx+t.length);} });
      if(score<=0) return; let pos=-1; for(const t of toks){ const p=bl.indexOf(t); if(p>=0&&(pos<0||p<pos)) pos=p; }
      let snip; if(pos<0){ snip=(n.body||'').slice(0,120); } else { const st=Math.max(0,pos-40); snip=(st>0?'…':'')+n.body.slice(st,st+150); }
      arr.push({id:n.id,title:n.title,category:n.category,score,snip}); });
    arr.sort((a,b)=>b.score-a.score); return arr.slice(0,15);
  }
  function hl(text,q){ text=esc(text); const toks=(q||'').trim().toLowerCase().split(/\s+/).filter(Boolean); toks.forEach(t=>{ if(!t) return; const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'); text=text.replace(re,'<mark>$1</mark>'); }); return text; }
  function onSearch(v){ const box=document.getElementById('results'); curResults=searchResults(v); selIdx=-1;
    if(!v.trim()){ box.classList.remove('show'); box.innerHTML=''; renderSidebar(''); return; } renderSidebar(v.trim());
    if(curResults.length===0){ box.innerHTML='<div class="res-empty">没有找到匹配的内容</div>'; box.classList.add('show'); return; }
    box.innerHTML=curResults.map((r,i)=>'<a class="res" data-i="'+i+'" onclick="WIKI.openResult('+i+')"><span class="rt">'+hl(r.title,v)+' <span class="rc">'+esc(r.category||'未分类')+'</span></span><span class="rs">'+hl(r.snip,v)+'</span></a>').join('');
    box.classList.add('show');
  }
  function searchKey(e){ const box=document.getElementById('results'); if(!box.classList.contains('show')) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); selIdx=Math.min(selIdx+1,curResults.length-1); markSel(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); selIdx=Math.max(selIdx-1,0); markSel(); }
    else if(e.key==='Enter'){ e.preventDefault(); openResult(selIdx<0?0:selIdx); }
    else if(e.key==='Escape'){ box.classList.remove('show'); } }
  function markSel(){ document.querySelectorAll('#results .res').forEach((el,i)=>{ el.classList.toggle('sel',i===selIdx); if(i===selIdx) el.scrollIntoView({block:'nearest'}); }); }
  function openResult(i){ if(curResults[i]){ open(curResults[i].id); document.getElementById('results').classList.remove('show'); document.getElementById('search').blur(); } }

  function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const FOLDER_KEY='wikiFolders', FOLDCOL_KEY='wikiFoldersCollapsed';
  function getFolders(){ try{ return JSON.parse(localStorage.getItem(FOLDER_KEY)||'[]'); }catch(e){ return []; } }
  function saveFolders(a){ try{ localStorage.setItem(FOLDER_KEY,JSON.stringify(Array.from(new Set(a)))); }catch(e){} }
  function getCollapsed(){ try{ return JSON.parse(localStorage.getItem(FOLDCOL_KEY)||'{}'); }catch(e){ return {}; } }
  function saveCollapsed(o){ try{ localStorage.setItem(FOLDCOL_KEY,JSON.stringify(o)); }catch(e){} }
  function searchVal(){ const s=document.getElementById('search'); return s?s.value.trim():''; }
  function jsesc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
  function allFolderPaths(){ const set=new Set(); const add=p=>{ if(!p) return; const parts=p.split('/'); let cur=''; parts.forEach(seg=>{ seg=seg.trim(); if(!seg) return; cur=cur?cur+'/'+seg:seg; set.add(cur); }); };
    Object.values(notes).forEach(n=>add((n.category||'').trim())); getFolders().forEach(add); return Array.from(set); }
  function buildTree(filterFn){ const root={name:'',path:'',children:{},notes:[]};
    function ensure(path){ if(!path) return root; let node=root, cur=''; path.split('/').forEach(p=>{ p=p.trim(); if(!p) return; cur=cur?cur+'/'+p:p; if(!node.children[p]) node.children[p]={name:p,path:cur,children:{},notes:[]}; node=node.children[p]; }); return node; }
    allFolderPaths().forEach(p=>ensure(p));
    Object.values(notes).forEach(n=>{ if(filterFn&&!filterFn(n)) return; ensure((n.category||'').trim()).notes.push(n); });
    return root; }
  function countNotes(node){ let c=node.notes.length; Object.values(node.children).forEach(ch=>c+=countNotes(ch)); return c; }
  function renderSidebar(filter){ const host=document.getElementById('treeRoot'); if(!host) return;
    const f=(filter||'').trim().toLowerCase(); const filterFn=f?(n=>n.title.toLowerCase().includes(f)||(n.body||'').toLowerCase().includes(f)):null;
    const root=buildTree(filterFn), col=getCollapsed();
    function nodeHTML(node,depth){ let out=''; const pad=8+depth*14;
      Object.values(node.children).sort((a,b)=>a.name.localeCompare(b.name,'zh')).forEach(fd=>{ if(filterFn&&countNotes(fd)===0) return; const isCol=!f&&col[fd.path]; const ep=jsesc(fd.path);
        out+='<div class="tree-row folder'+(isCol?' collapsed':'')+'" data-folder="'+escAttr(fd.path)+'" style="padding-left:'+pad+'px" onclick="WIKI.toggleFolder(\''+ep+'\')" ondragover="WIKI.folderDragOver(event)" ondragleave="WIKI.folderDragLeave(event)" ondrop="WIKI.folderDrop(event,\''+ep+'\')">'
          +'<span class="caret">▾</span><span>📁</span><span class="tlabel">'+escAttr(fd.name)+'</span><span class="tcount">'+countNotes(fd)+'</span>'
          +'<span class="tacts"><button title="在此新建笔记" onclick="event.stopPropagation();WIKI.newNoteInFolder(\''+ep+'\')">＋</button><button title="重命名" onclick="event.stopPropagation();WIKI.renameFolder(\''+ep+'\')">✎</button><button title="删除" onclick="event.stopPropagation();WIKI.deleteFolder(\''+ep+'\')">🗑</button></span></div>';
        out+='<div class="tree-children'+(isCol?' hidden':'')+'">'+nodeHTML(fd,depth+1)+'</div>'; });
      node.notes.sort((a,b)=>a.title.localeCompare(b.title,'zh')).forEach(n=>{
        out+='<div class="tree-row note'+(n.id===current&&view==='note'?' active':'')+'" draggable="true" data-note="'+n.id+'" style="padding-left:'+(pad+14)+'px" onclick="WIKI.open(\''+n.id+'\')" ondragstart="WIKI.noteDragStart(event,\''+n.id+'\')" ondragend="WIKI.noteDragEnd()"><span class="dot"></span><span class="tlabel">'+escAttr(n.title)+'</span></div>'; });
      return out; }
    let html=nodeHTML(root,0); host.innerHTML=html||'<div class="empty">没有匹配的页面。</div>';
  }
  function toggleFolder(path){ const col=getCollapsed(); col[path]=!col[path]; if(!col[path]) delete col[path]; saveCollapsed(col); renderSidebar(searchVal()); }
  function collapseAll(c){ const col={}; if(c) allFolderPaths().forEach(p=>col[p]=true); saveCollapsed(col); renderSidebar(searchVal()); }
  function newFolder(){ const name=prompt('新建文件夹（可用 / 建立多级，如  操作系统/并发）：',''); if(name==null) return; const path=name.split('/').map(s=>s.trim()).filter(Boolean).join('/'); if(!path) return; const fs=getFolders(); fs.push(path); saveFolders(fs); const col=getCollapsed(); delete col[path]; saveCollapsed(col); renderSidebar(searchVal()); toast('已创建文件夹「'+path+'」'); }
  function newNoteInFolder(path){ openEditor(null); document.getElementById('edCat').value=path; }
  function renameFolder(path){ const parts=path.split('/'); const cur=parts[parts.length-1]; const nn=prompt('重命名文件夹（仅改这一级名称）：',cur); if(nn==null) return; const name=nn.trim(); if(!name||name===cur) return; parts[parts.length-1]=name; reassignPrefix(path,parts.join('/')); toast('已重命名为「'+name+'」'); }
  function deleteFolder(path){ const parent=path.split('/').slice(0,-1).join('/'); if(!confirm('删除文件夹「'+path+'」？\n其中的笔记与子文件夹会移动到上一级（不会删除笔记）。')) return; reassignPrefix(path,parent); saveFolders(getFolders().filter(p=>p!==path)); toast('已删除文件夹'); }
  function reassignPrefix(oldP,newP){
    Object.values(notes).forEach(n=>{ const c=(n.category||'').trim(); if(c===oldP) n.category=newP; else if(c.startsWith(oldP+'/')) n.category=(newP?newP+'/':'')+c.slice(oldP.length+1); });
    saveFolders(getFolders().map(p=>{ if(p===oldP) return newP; if(p.startsWith(oldP+'/')) return (newP?newP+'/':'')+p.slice(oldP.length+1); return p; }).filter(Boolean));
    const col=getCollapsed(), ncol={}; Object.keys(col).forEach(k=>{ let nk=k; if(k===oldP) nk=newP; else if(k.startsWith(oldP+'/')) nk=(newP?newP+'/':'')+k.slice(oldP.length+1); if(nk) ncol[nk]=col[k]; }); saveCollapsed(ncol);
    persist(); renderSidebar(searchVal()); refreshCrumb();
  }
  function refreshCrumb(){ if(current&&notes[current]) document.getElementById('crumb').innerHTML='<span class="chip">'+escAttr(notes[current].category||'未分类')+'</span> ／ '+escAttr(notes[current].title); }
  let dragNoteId=null;
  function noteDragStart(e,id){ dragNoteId=id; try{ e.dataTransfer.setData('text/plain',id); e.dataTransfer.effectAllowed='move'; }catch(_){ } const tr=document.getElementById('treeRoot'); if(tr) tr.classList.add('drop-root'); }
  function noteDragEnd(){ dragNoteId=null; const tr=document.getElementById('treeRoot'); if(tr) tr.classList.remove('drop-root'); document.querySelectorAll('.tree-row.drop-target').forEach(el=>el.classList.remove('drop-target')); }
  function folderDragOver(e){ if(!dragNoteId) return; e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drop-target'); }
  function folderDragLeave(e){ e.currentTarget.classList.remove('drop-target'); }
  function folderDrop(e,path){ if(!dragNoteId) return; e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('drop-target'); moveNoteToFolder(dragNoteId,path); noteDragEnd(); }
  function moveNoteToFolder(id,path){ if(!notes[id]) return; notes[id].category=path; notes[id].updated=new Date().toISOString().slice(0,16).replace('T',' '); persist(); renderSidebar(searchVal()); refreshCrumb(); toast('已移动到「'+(path||'根目录')+'」'); }
  function showView(v){ view=v; document.getElementById('reader').style.display=v==='note'?'':'none'; document.getElementById('activity').style.display=v==='activity'?'':'none'; }
  function open(id){ if(!notes[id]) return; current=id; showView('note'); const n=notes[id];
    document.getElementById('crumb').innerHTML='<span class="chip">'+escAttr(n.category||'未分类')+'</span> ／ '+escAttr(n.title);
    document.getElementById('pgTitle').textContent=n.title; document.getElementById('pgMeta').textContent=n.updated?('最近更新：'+n.updated):'';
    document.getElementById('pgBody').innerHTML=render(n.body); renderBacklinks(id); renderSidebar(document.getElementById('search').value.trim());
    const isEmbed=/(^|\n)@embed(html)?\s+/.test(n.body||''); document.getElementById('reader').classList.toggle('embed-page',isEmbed); autoSizeEmbeds();
    document.getElementById('main').scrollTop=0; recordVisit(); toggleNav(false);
  }
  function renderBacklinks(id){ const title=notes[id].title.trim(); const refs=Object.values(notes).filter(n=>n.id!==id && new RegExp('\\[\\[\\s*'+title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*\\]\\]').test(n.body||''));
    const box=document.getElementById('backlinks'); box.innerHTML=refs.length?('<h3>链接到本页的笔记</h3>'+refs.map(n=>'<a href="#" onclick="WIKI.open(\''+n.id+'\');return false;">'+escAttr(n.title)+'</a>').join('')):''; }
  function goByTitle(t){ const id=idByTitle(t); if(id) open(id); }
  function cur(){ return current; }

  function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function getVisits(){ try{ return JSON.parse(localStorage.getItem(VIS_KEY)||'{}'); }catch(e){ return {}; } }
  function recordVisit(){ try{ const v=getVisits(); const k=todayStr(); v[k]=(v[k]||0)+1; localStorage.setItem(VIS_KEY,JSON.stringify(v)); }catch(e){} }
  function noteDateMap(){ const m={}; Object.values(notes).forEach(n=>{ const d=(n.updated||'').slice(0,10); if(/^\d{4}-\d{2}-\d{2}$/.test(d)){ m[d]=(m[d]||0)+1; } }); return m; }
  function level(c){ return c<=0?0:c<2?1:c<4?2:c<7?3:4; }
  function buildHeatmap(map){ const today=new Date(); today.setHours(0,0,0,0); const end=new Date(today); const start=new Date(today); start.setDate(start.getDate()-7*52-today.getDay());
    const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']; let cols=[], monthRow=[], lastMonth=-1, total=0, maxc=0, activeDays=0; let d=new Date(start);
    while(d<=end || d.getDay()!==0){ const col=[]; let cfm=-1; for(let r=0;r<7;r++){ const cell=new Date(d); const ds=todayStr(cell); if(cell>today){ col.push({empty:true}); } else { const c=map[ds]||0; col.push({date:ds,c}); if(c>0){activeDays++; total+=c;} if(c>maxc)maxc=c; } if(r===0)cfm=cell.getMonth(); d.setDate(d.getDate()+1); }
      cols.push(col); if(cfm!==lastMonth){ monthRow.push(months[cfm]); lastMonth=cfm; } else monthRow.push(''); if(d>end && d.getDay()===0) break; }
    let streak=0, dd=new Date(today); while(true){ const c=map[todayStr(dd)]||0; if(c>0){streak++; dd.setDate(dd.getDate()-1);} else break; } return {cols,monthRow,total,maxc,activeDays,streak};
  }
  function heatmapHTML(title,hint,map,unit){ const h=buildHeatmap(map); const days=['','一','','三','','五','']; let grid='';
    h.cols.forEach(col=>{ grid+='<div class="hm-col">'+col.map(cell=>{ if(cell.empty) return '<i class="hm-cell empty"></i>'; return '<i class="hm-cell" data-l="'+level(cell.c)+'" title="'+cell.date+'：'+cell.c+' '+unit+'"></i>'; }).join('')+'</div>'; });
    const months=h.monthRow.map(m=>'<span style="width:15px;display:inline-block">'+m+'</span>').join('');
    return '<div class="hm-card"><h3>'+title+'</h3><div class="hint">'+hint+'</div><div class="hm-stats">'+

  function cropReset(){ const img=document.getElementById('cropImg'); cropStageW=img.clientWidth; cropStageH=img.clientHeight; cropState={x:0,y:0,w:cropStageW,h:cropStageH}; cropSync(); }
  function cropDown(e){ const handle=e.target.classList.contains('crop-h')?e.target.dataset.h:null;

  function cropMove(e){ if(!cropDrag) return; const dx=e.clientX-cropDrag.sx, dy=e.clientY-cropDrag.sy, W=cropStageW, H=cropStageH, MIN=24; const {ox,oy,ow,oh,mode}=cropDrag;
    if(mode==='move'){ cropState.x=Math.max(0,Math.min(ox+dx,W-ow)); cropState.y=Math.max(0,Math.min(oy+dy,H-oh)); }
    else { let x1=ox,y1=oy,x2=ox+ow,y2=oy+oh;
      if(mode.includes('w')) x1=Math.max(0,Math.min(ox+dx,x2-MIN));
      if(mode.includes('e')) x2=Math.min(W,Math.max(ox+ow+dx,x1+MIN));
      if(mode.includes('n')) y1=Math.max(0,Math.min(oy+dy,y2-MIN));
      if(mode.includes('s')) y2=Math.min(H,Math.max(oy+oh+dy,y1+MIN));
      cropState={x:x1,y:y1,w:x2-x1,h:y2-y1}; }

  async function importMarkdownFiles(files){ if(!files||!files.length) return;
    const arr=Array.from(files).filter(f=>/\.(md|markdown|txt)$/i.test(f.name));
    if(!arr.length){ toast('未选择 Markdown 文件'); return; }
    const now=new Date().toISOString().slice(0,16).replace('T',' '); let count=0, firstId=null, skipped=0;
    for(const f of arr){ let text=''; try{ text=typeof f.text==='function'?await f.text():await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsText(f); }); }catch(e){ skipped++; continue; }
      text=(text||'').replace(/\r/g,''); let category='Markdown 导入', title='';

      if(!title){ const h=text.match(/^#\s+(.+)$/m); if(h) title=h[1].trim(); }
      if(!title) title=f.name.replace(/\.(md|markdown|txt)$/i,'');
      const rel=f.webkitRelativePath||f._rel; if(rel){ const parts=rel.split('/'); if(parts.length>1 && parts[parts.length-2]) category=parts[parts.length-2]; }

  }
  async function collectDropFiles(dt){ const items=dt.items?Array.from(dt.items):[]; const entries=items.map(it=>it.webkitGetAsEntry&&it.webkitGetAsEntry()).filter(Boolean);
    if(!entries.length) return Array.from(dt.files||[]); const out=[];
    function readDir(reader){ return new Promise(res=>{ const acc=[]; const step=()=>reader.readEntries(ents=>{ if(!ents.length){ res(acc); } else { acc.push(...ents); step(); } }, ()=>res(acc)); step(); }); }
    async function walk(entry,prefix){ if(entry.isFile){ await new Promise(res=>entry.file(f=>{ try{ f._rel=prefix+entry.name; }catch(_){ } out.push(f); res(); },()=>res())); }
      else if(entry.isDirectory){ const ents=await readDir(entry.createReader()); for(const e of ents) await walk(e, prefix+entry.name+'/'); } }
    for(const en of entries) await walk(en,''); return out;
  }

    const acts=Array.from(document.querySelectorAll('#aiActs .ai-chip.on')).map(c=>c.dataset.act);
    if(!acts.length&&!aiAttachments.length&&!document.getElementById('aiInstruct').value.trim()){ toast('请至少选择一个动作或填写指令'); return; }
    const folders=allFolderPaths().sort(); const tasks=[];
    if(acts.includes('polish')) tasks.push('润色并改写正文，使表达更清晰流畅，但必须保留原意与所有关键信息、代码、公式、表格。');
    if(acts.includes('summary')) tasks.push('在正文最前面加上「## 摘要」和「## 大纲」两节，分别给出要点摘要与层级大纲。');
    if(acts.includes('format')) tasks.push('修正 Markdown 格式，统一标题层级与中英文标点，纠正明显的错别字。');
    if(acts.includes('categorize')) tasks.push('在输出的最后另起一行，用 `CATEGORY: 路径` 给出最合适的分类文件夹路径（用 / 表示层级）。现有文件夹供参考：'+(folders.join(' | ')||'（暂无）'));
    const up=[]; up.push('请对下面这篇笔记进行整理：'+(tasks.length?('\n'+tasks.map((t,i)=>(i+1)+'. '+t).join('\n')):'按补充指令处理。'));
    const ins=document.getElementById('aiInstruct').value.trim(); if(ins) up.push('额外要求：'+ins);
    if(aiAttachments.length) up.push('我附带了图片/PDF素材，请结合它们补充或整理这篇笔记。');
    up.push('\n笔记标题：'+n.title+'\n当前分类：'+(n.category||'（无）')+'\n\n正文：\n'+n.body);
    up.push('\n请直接输出整理后的完整 Markdown 正文，不要寒暄或额外解释；若需给分类则把 CATEGORY 行放最后。');
    const images=aiAttachments.filter(a=>a.kind==='image').map(a=>a.data); const pdfs=aiAttachments.filter(a=>a.kind==='pdf').map(a=>a.data); const ai=getAI();
    if(pdfs.length&&ai.provider!=='anthropic') toast('PDF 仅 Claude 接口支持，已忽略 PDF');
    const btn=document.getElementById('aiRunBtn'), st=document.getElementById('aiRunStatus'); btn.disabled=true; st.textContent='AI 处理中…'; document.getElementById('aiOutWrap').style.display=''; document.getElementById('aiOut').textContent='';
    try{ const out=await callAI({system:'你是一个中文笔记整理助手，严格按要求处理并只输出干净的 Markdown。',user:up.join('\n'),images,pdfs:ai.provider==='anthropic'?pdfs:[]});
      aiSuggestedCat=null; let body=out; const cm=out.match(/(^|\n)\s*CATEGORY:\s*(.+?)\s*$/i); if(cm){ aiSuggestedCat=cm[2].trim(); body=out.replace(cm[0],'').trim(); }
      aiLastBody=body; document.getElementById('aiOut').textContent=out;
      document.getElementById('aiApplyReplace').style.display=''; document.getElementById('aiApplyPrepend').style.display='';
      const cb=document.getElementById('aiApplyCat'); cb.style.display=aiSuggestedCat?'':'none'; if(aiSuggestedCat) cb.textContent='采用分类：'+aiSuggestedCat;
      st.textContent='✓ 完成'; }
    catch(e){ st.textContent='✗ 失败'; document.getElementById('aiOut').textContent='调用失败：'+(e.message||e)+'\n\n若为 CORS/网络错误，说明该接口可能不允许浏览器直接调用，或 Base URL / 密钥有误。'; }
    finally{ btn.disabled=false; } }
  function aiApply(mode){ if(!current||!notes[current]) return; const n=notes[current]; const now=new Date().toISOString().slice(0,16).replace('T',' ');
    if(mode==='replace'){ if(!aiLastBody){ toast('没有可应用的内容'); return; } n.body=aiLastBody; n.updated=now; }
    else if(mode==='prepend'){ if(!aiLastBody){ toast('没有可应用的内容'); return; } n.body=aiLastBody+'\n\n---\n\n'+n.body; n.updated=now; }
    else if(mode==='cat'){ if(!aiSuggestedCat) return; n.category=aiSuggestedCat; const fs=getFolders(); fs.push(aiSuggestedCat); saveFolders(fs); }
    persist(); closeAIOrganize(); open(current); toast('✓ 已应用'); }

  function neutralizeEmbedBg(fr){ try{ const d=fr.contentDocument; if(!d) return; let st=d.getElementById('__wikiBgKill'); if(!st){ st=d.createElement('style'); st.id='__wikiBgKill'; (d.head||d.documentElement).appendChild(st); } st.textContent=embedOverrideCSS(); }catch(e){} }
  function fitEmbed(fr){ try{ const d=fr.contentDocument; if(d&&d.body){ const h=Math.max(d.body.scrollHeight, d.documentElement?d.documentElement.scrollHeight:0); if(h>0){ fr.style.height=(h+2)+'px'; return true; } } }catch(e){} return false; }
  function autoSizeEmbeds(){ document.querySelectorAll('#pgBody iframe.embed').forEach(fr=>{
      if(fr._autosized) { neutralizeEmbedBg(fr); fitEmbed(fr); return; } fr._autosized=true;
      const onload=()=>{ neutralizeEmbedBg(fr); if(!fitEmbed(fr)){ fr.style.height='150vh'; } setTimeout(()=>{neutralizeEmbedBg(fr);fitEmbed(fr);},200); setTimeout(()=>fitEmbed(fr),700); setTimeout(()=>fitEmbed(fr),1500);
        try{ const d=fr.contentDocument; if(d&&d.body&&window.ResizeObserver){ new ResizeObserver(()=>fitEmbed(fr)).observe(d.body); } if(d&&d.defaultView){ d.defaultView.addEventListener('resize',()=>fitEmbed(fr)); } }catch(e){} };
      fr.addEventListener('load',onload); neutralizeEmbedBg(fr); if(!fitEmbed(fr)) fr.style.height=fr.style.height||'150vh';

  function seed(){ const now=new Date().toISOString().slice(0,16).replace('T',' '); const mk=(id,title,category,body)=>({id,title,category,body,updated:now}); const data={};
    [
