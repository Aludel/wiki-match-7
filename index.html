<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的学习 Wiki</title>
<script>
  (function(){
    try{ var t=localStorage.getItem('wikiTheme'); if(!t) t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'; document.documentElement.setAttribute('data-theme',t); }
    catch(e){ document.documentElement.setAttribute('data-theme','light'); }
  })();
</script>
<style>
  :root[data-theme="light"]{
    --bg:#f5f6fb; --bg-grad1:#eef1ff; --bg-grad2:#fdf2f8;
    --panel:#ffffff; --panel-2:#fbfcfe; --panel-soft:#f3f5fb;
    --ink:#1c2230; --ink-soft:#3a4256; --muted:#6b7488; --faint:#9aa3b5;
    --accent:#6366f1; --accent-2:#8b5cf6; --accent-ink:#4f46e5; --accent-soft:#eef0ff;
    --line:#e6e9f2; --line-soft:#eef1f7; --code-bg:#0f172a; --code-ink:#e6edf8; --code-line:#1e293b;
    --shadow:0 1px 2px rgba(20,30,60,.04), 0 8px 28px rgba(20,30,60,.07); --shadow-sm:0 1px 3px rgba(20,30,60,.07);
    --green:#16a34a; --red:#e11d48; --red-soft:#ffe4e6; --ring:rgba(99,102,241,.28);
    --mark:#fde68a; --mark-ink:#7c4a03; --hm0:#e9ecf2; --hm1:#c7d2fe; --hm2:#a5b4fc; --hm3:#818cf8; --hm4:#4f46e5;
  }
  :root[data-theme="dark"]{
    --bg:#0c0f16; --bg-grad1:#11162400; --bg-grad2:#0c0f1600;
    --panel:#141923; --panel-2:#11151e; --panel-soft:#1a2030;
    --ink:#e8ecf5; --ink-soft:#c2cad8; --muted:#8b95a8; --faint:#6b7488;
    --accent:#818cf8; --accent-2:#a78bfa; --accent-ink:#a5b0ff; --accent-soft:rgba(129,140,248,.16);
    --line:#242b39; --line-soft:#1c2230; --code-bg:#0a0d14; --code-ink:#d8e2f2; --code-line:#1c2433;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35); --shadow-sm:0 1px 3px rgba(0,0,0,.35);
    --green:#34d399; --red:#fb7185; --red-soft:rgba(251,113,133,.16); --ring:rgba(129,140,248,.35);
    --mark:#facc15; --mark-ink:#1c1400; --hm0:#1b2230; --hm1:#312e81; --hm2:#4f46e5; --hm3:#818cf8; --hm4:#c7d2fe;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; line-height:1.78; font-size:15.5px; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; transition:background .35s ease, color .35s ease;}
  #wallLayer{position:fixed; inset:0; z-index:-3; background-size:cover; background-position:center; transition:.4s;}
  #wallDim{position:fixed; inset:0; z-index:-2; background:var(--bg); transition:.4s;}
  body::before{content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; background:radial-gradient(900px 500px at 12% -8%, var(--bg-grad1), transparent 60%),radial-gradient(800px 480px at 100% 0%, var(--bg-grad2), transparent 55%);}
  ::selection{background:var(--accent-soft); color:var(--accent-ink);}
  *::-webkit-scrollbar{width:10px; height:10px;} *::-webkit-scrollbar-thumb{background:var(--line); border-radius:20px; border:2px solid transparent; background-clip:padding-box;} *::-webkit-scrollbar-thumb:hover{background:var(--faint);}
  mark{background:var(--mark); color:var(--mark-ink); border-radius:3px; padding:0 2px;}

  header.top{display:flex; align-items:center; gap:9px; padding:11px 18px; background:color-mix(in srgb, var(--panel) 84%, transparent); backdrop-filter:saturate(160%) blur(12px); -webkit-backdrop-filter:saturate(160%) blur(12px); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:40;}
  .menu-btn{display:none; background:none; border:none; cursor:pointer; font-size:20px; color:var(--ink); padding:4px 6px; border-radius:8px;}
  .menu-btn:hover{background:var(--panel-soft);}
  .logo{font-weight:800; font-size:16px; white-space:nowrap; display:flex; align-items:center; gap:9px;}
  .logo .mark{width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 4px 12px var(--ring);}
  .logo .txt{background:linear-gradient(120deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .logo .txt b{color:var(--ink); font-weight:800;}
  .spacer{flex:1}
  .searchbox{position:relative; flex:1; max-width:380px;}
  .searchbox svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--faint);}
  .searchbox input{width:100%; padding:9px 14px 9px 38px; border:1px solid var(--line); border-radius:11px; font-size:14px; background:var(--panel-2); color:var(--ink); transition:.18s;}
  .searchbox input::placeholder{color:var(--faint);}
  .searchbox input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 4px var(--ring); background:var(--panel);}
  .results{position:absolute; top:46px; left:0; right:0; background:var(--panel); border:1px solid var(--line); border-radius:13px; box-shadow:var(--shadow); padding:6px; max-height:60vh; overflow-y:auto; display:none; z-index:50;}
  .results.show{display:block;}
  .res{display:block; padding:9px 12px; border-radius:9px; cursor:pointer; text-decoration:none; color:var(--ink);}
  .res:hover,.res.sel{background:var(--accent-soft);}
  .res .rt{font-weight:650; font-size:14px; display:flex; align-items:center; gap:8px;}
  .res .rc{font-size:11px; color:var(--accent-ink); background:var(--accent-soft); padding:1px 8px; border-radius:999px;}
  .res .rs{font-size:12.5px; color:var(--muted); margin-top:2px; line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .res-empty{padding:14px; color:var(--muted); font-size:13px; text-align:center;}
  .iconbtn{width:38px; height:38px; flex:0 0 38px; border:1px solid var(--line); border-radius:11px; background:var(--panel-2); cursor:pointer; display:grid; place-items:center; font-size:15px; color:var(--ink); transition:.18s;}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px); box-shadow:var(--shadow-sm);}
  .btn-primary{font-size:13.5px; font-weight:650; color:#fff; padding:9px 15px; border-radius:11px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 4px 14px var(--ring); transition:.18s; white-space:nowrap;}
  .btn-primary:hover{filter:brightness(1.06); transform:translateY(-1px);}

  .wrap{display:flex; flex:1; min-height:0; position:relative;}
  .scrim{display:none; position:fixed; inset:0; background:rgba(8,10,18,.5); z-index:29;}
  nav.side{width:280px; flex:0 0 280px; overflow-y:auto; padding:18px 12px 50px; border-right:1px solid var(--line); background:color-mix(in srgb,var(--panel-2) 92%, transparent);}
  nav.side .cat{font-size:11.5px; letter-spacing:.09em; color:var(--faint); text-transform:uppercase; margin:18px 12px 6px; font-weight:800; display:flex; align-items:center; gap:7px;}
  nav.side .cat::before{content:""; width:6px; height:6px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2));}
  nav.side a.item{position:relative; display:flex; align-items:center; gap:9px; padding:8px 13px; margin:2px 0; color:var(--ink-soft); text-decoration:none; border-radius:10px; font-size:14px; cursor:pointer; transition:.15s; border:1px solid transparent;}
  nav.side a.item .dot{width:6px; height:6px; border-radius:50%; background:var(--faint); flex:0 0 6px; transition:.15s;}
  nav.side a.item:hover{background:var(--panel-soft); color:var(--ink);} nav.side a.item:hover .dot{background:var(--accent);}
  nav.side a.item.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:650; border-color:color-mix(in srgb, var(--accent) 22%, transparent);}
  nav.side a.item.active .dot{background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 0 0 3px var(--ring);}
  nav.side .empty{color:var(--muted); font-size:13px; padding:12px 14px;}
  main.content{flex:1; min-width:0; overflow-y:auto; padding:34px 52px 110px; scroll-behavior:smooth;}
  article{max-width:800px; margin:0 auto; animation:fade .4s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .reader.hide{display:none;}
  .crumb{color:var(--muted); font-size:13px; margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .crumb .chip{background:var(--accent-soft); color:var(--accent-ink); padding:2px 10px; border-radius:999px; font-weight:650;}
  article h1{font-size:30px; font-weight:820; margin:4px 0 8px; line-height:1.28; letter-spacing:-.01em;}
  .meta{color:var(--faint); font-size:12.5px; margin-bottom:14px;}
  .page-actions{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
  article h2{font-size:21px; font-weight:760; margin:34px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;}
  article h2::before{content:""; width:4px; height:18px; border-radius:3px; background:linear-gradient(180deg,var(--accent),var(--accent-2));}
  article h3{font-size:17px; font-weight:720; margin:24px 0 8px; color:var(--accent-ink);}
  article p{margin:12px 0;} article ul,article ol{padding-left:22px; margin:12px 0;} article li{margin:6px 0;}
  article ul li::marker{color:var(--accent);} article ol li::marker{color:var(--accent); font-weight:700;}
  article blockquote{margin:18px 0; padding:14px 18px 14px 20px; background:var(--accent-soft); border-radius:0 12px 12px 0; color:var(--ink-soft); border-left:4px solid var(--accent);}
  article blockquote p{margin:4px 0;}
  article code.inline{background:var(--accent-soft); color:var(--accent-ink); padding:2px 7px; border-radius:6px; font-size:13.5px; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-weight:600;}
  article pre.code{position:relative; background:var(--code-bg); color:var(--code-ink); padding:36px 18px 16px; border-radius:14px; overflow-x:auto; font-size:13.5px; line-height:1.7; margin:18px 0; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; border:1px solid var(--code-line); box-shadow:var(--shadow-sm);}
  article pre.code::before{content:""; position:absolute; top:14px; left:16px; width:11px; height:11px; border-radius:50%; background:#ff5f57; box-shadow:18px 0 0 #febc2e, 36px 0 0 #28c840;}
  article iframe.embed{width:100%; height:82vh; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow-sm); background:#fff; margin:14px 0; display:block;}
  article a{color:var(--accent-ink); text-decoration:none; border-bottom:1.5px solid transparent; transition:.15s;}
  article a:hover{border-bottom-color:var(--accent);}
  article a.wlink{background:var(--accent-soft); padding:1.5px 8px; border-radius:7px; font-weight:600; border-bottom:none;}
  article a.wlink:hover{filter:brightness(.97); box-shadow:0 0 0 3px var(--ring);}
  article a.wlink.missing{background:var(--red-soft); color:var(--red);} article a.wlink.missing::after{content:" ✚"; font-size:11px;}
  article hr{border:none; border-top:1px dashed var(--line); margin:28px 0;}
  article table{border-collapse:separate; border-spacing:0; width:100%; margin:18px 0; font-size:14px; border:1px solid var(--line); border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm);}
  article th{background:var(--accent-soft); color:var(--accent-ink); padding:10px 14px; text-align:left; font-weight:700; border-bottom:1px solid var(--line);}
  article td{padding:9px 14px; border-bottom:1px solid var(--line-soft);}
  article tbody tr:nth-child(even){background:var(--panel-soft);} article tbody tr:last-child td{border-bottom:none;} article tbody tr:hover{background:var(--accent-soft);}
  .backlinks{margin-top:46px; padding-top:20px; border-top:1px solid var(--line);}
  .backlinks h3{font-size:13px; color:var(--muted); margin:0 0 10px; font-weight:700;}
  .backlinks a{display:inline-flex; align-items:center; gap:6px; margin:0 8px 8px 0; font-size:13px; color:var(--ink-soft); text-decoration:none; background:var(--panel); border:1px solid var(--line); padding:6px 12px; border-radius:999px; transition:.15s; box-shadow:var(--shadow-sm);}
  .backlinks a::before{content:"🔗"; font-size:11px;} .backlinks a:hover{border-color:var(--accent); color:var(--accent-ink); transform:translateY(-1px);}

  .activity{max-width:880px; margin:0 auto; animation:fade .4s ease;}
  .activity h1{font-size:26px; font-weight:800; margin:0 0 6px;}
  .activity .sub{color:var(--muted); font-size:13.5px; margin-bottom:24px;}
  .hm-card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin:0 0 22px; box-shadow:var(--shadow-sm); overflow-x:auto;}
  .hm-card h3{margin:0 0 4px; font-size:16px; font-weight:740;}
  .hm-card .hint{color:var(--muted); font-size:12.5px; margin:0 0 14px;}
  .hm-stats{display:flex; gap:22px; flex-wrap:wrap; margin:0 0 16px;}
  .hm-stat b{display:block; font-size:22px; font-weight:800; color:var(--accent-ink); line-height:1.1;}
  .hm-stat span{font-size:12px; color:var(--muted);}
  .hm-months{display:flex; gap:3px; margin:0 0 4px 0; padding-left:26px; font-size:10px; color:var(--faint);}
  .hm-body{display:flex; gap:8px;}
  .hm-days{display:grid; grid-template-rows:repeat(7,12px); gap:3px; font-size:9px; color:var(--faint);}
  .hm-days span{height:12px; line-height:12px;}
  .hm-grid{display:flex; gap:3px;}
  .hm-col{display:grid; grid-template-rows:repeat(7,12px); gap:3px;}
  .hm-cell{width:12px; height:12px; border-radius:3px; background:var(--hm0);}
  .hm-cell[data-l="1"]{background:var(--hm1);} .hm-cell[data-l="2"]{background:var(--hm2);} .hm-cell[data-l="3"]{background:var(--hm3);} .hm-cell[data-l="4"]{background:var(--hm4);}
  .hm-cell.empty{background:transparent;}
  .hm-legend{display:flex; align-items:center; gap:6px; margin-top:12px; font-size:11px; color:var(--muted); justify-content:flex-end;}
  .hm-legend i{width:12px; height:12px; border-radius:3px; display:inline-block;}

  .overlay{position:fixed; inset:0; background:rgba(8,10,18,.55); z-index:70; display:none; backdrop-filter:blur(2px);}
  .overlay.show{display:block;}
  .drawer{position:fixed; top:0; right:0; bottom:0; width:380px; max-width:92vw; background:var(--panel); border-left:1px solid var(--line); z-index:71; transform:translateX(104%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:var(--shadow);}
  .drawer.show{transform:none;}
  .drawer .dh{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line);}
  .drawer .dh h3{margin:0; font-size:16px; font-weight:740;}
  .drawer .db{padding:18px 20px; overflow-y:auto;}
  .field{margin-bottom:18px;} .field label{display:block; font-size:13px; font-weight:650; color:var(--ink-soft); margin-bottom:8px;}
  .seg{display:flex; gap:6px; flex-wrap:wrap;}
  .seg button{font-size:13px; padding:7px 12px; border-radius:9px; border:1px solid var(--line); background:var(--panel-2); color:var(--ink-soft); cursor:pointer;}
  .seg button.on{background:var(--accent-soft); color:var(--accent-ink); border-color:color-mix(in srgb,var(--accent) 30%,transparent); font-weight:650;}
  .presets{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .preset{height:46px; border-radius:10px; cursor:pointer; border:2px solid transparent; background-size:cover; background-position:center;}
  .preset.on{border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .field input[type=text]{width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:9px; background:var(--panel-2); color:var(--ink); font-size:13.5px;}
  .field input[type=text]:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .field input[type=range]{width:100%; accent-color:var(--accent);}
  .rangeval{font-size:12px; color:var(--muted); float:right;}

  .modal{position:fixed; inset:0; background:rgba(8,10,18,.55); z-index:80; display:none; padding:3vh 2vw; backdrop-filter:blur(2px);}
  .modal.show{display:flex;}
  .editor{margin:auto; width:100%; max-width:900px; max-height:94vh; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden;}
  .editor .eh{display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
  .editor .eh input.t{flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:16px; font-weight:700; background:var(--panel-2); color:var(--ink);}
  .editor .eh input.c{width:150px; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-size:13px; background:var(--panel-2); color:var(--ink);}
  .editor .eh input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .tabs{display:flex; gap:4px; padding:10px 18px 0;}
  .tabs button{font-size:13px; padding:8px 14px; border:none; background:none; color:var(--muted); cursor:pointer; border-radius:9px 9px 0 0; font-weight:650;}
  .tabs button.on{color:var(--accent-ink); background:var(--accent-soft);}
  .toolbar{display:flex; gap:4px; padding:8px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
  .toolbar button{min-width:34px; height:32px; padding:0 9px; border:1px solid var(--line); background:var(--panel-2); border-radius:8px; cursor:pointer; font-size:13px; color:var(--ink); font-weight:650;}
  .toolbar button:hover{border-color:var(--accent); color:var(--accent);}
  .epane{flex:1; overflow:auto; padding:18px 22px;}
  .wysiwyg{min-height:300px; outline:none; line-height:1.75; font-size:15px;}
  .wysiwyg h1{font-size:24px;} .wysiwyg h2{font-size:19px;} .wysiwyg h3{font-size:16px; color:var(--accent-ink);}
  .wysiwyg pre{background:var(--code-bg); color:var(--code-ink); padding:12px 14px; border-radius:10px; font-family:ui-monospace,monospace; font-size:13px; overflow-x:auto;}
  .wysiwyg blockquote{border-left:3px solid var(--accent); padding-left:12px; color:var(--ink-soft); margin:10px 0;}
  .wysiwyg code{background:var(--accent-soft); color:var(--accent-ink); padding:1px 6px; border-radius:5px; font-family:ui-monospace,monospace;}
  .mdsrc{width:100%; min-height:320px; border:none; outline:none; resize:none; background:transparent; color:var(--ink); font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:14px; line-height:1.7;}
  .ef{display:flex; gap:10px; padding:14px 18px; border-top:1px solid var(--line); flex-wrap:wrap; align-items:center;}
  .ef .grow{flex:1}
  .btn-green{font-size:13.5px; font-weight:650; padding:9px 16px; border-radius:11px; background:var(--green); color:#fff; border:none; cursor:pointer; box-shadow:var(--shadow-sm);}
  .btn-green:hover{filter:brightness(1.05); transform:translateY(-1px);}
  .btn-soft{font-size:13.5px; font-weight:600; padding:9px 14px; border-radius:10px; background:var(--accent-soft); color:var(--accent-ink); border:none; cursor:pointer;}
  .btn-ghost{font-size:13.5px; font-weight:600; padding:9px 14px; border-radius:10px; background:var(--panel-soft); color:var(--muted); border:1px solid var(--line); cursor:pointer;} .btn-ghost:hover{color:var(--ink);}
  .btn-danger{font-size:13px; font-weight:600; padding:9px 13px; border-radius:10px; background:var(--red-soft); color:var(--red); border:none; cursor:pointer;}
  .toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:var(--bg); padding:11px 20px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:.28s; z-index:90; box-shadow:var(--shadow);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  @media(max-width:880px){
    main.content{padding:24px 18px 80px;}
    nav.side{position:fixed; top:0; left:0; bottom:0; z-index:30; transform:translateX(-104%); transition:transform .28s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow);}
    .wrap.open nav.side{transform:none;} .wrap.open .scrim{display:block;}
    .menu-btn{display:grid;} .searchbox{order:5; flex-basis:100%; max-width:none;} header.top{flex-wrap:wrap;}
    article h1{font-size:25px;} .btn-primary span.lbl{display:none;}
  }
</style>
</head>
<body>
<div id="wallLayer"></div><div id="wallDim"></div>
<header class="top">
  <button class="menu-btn" aria-label="菜单" onclick="WIKI.toggleNav()">☰</button>
  <div class="logo"><span class="mark">📚</span><span class="txt">我的学习 <b>Wiki</b></span></div>
  <div class="searchbox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>

<script>
const KEY='myStudyWiki_v1', VIS_KEY='wikiVisits', WALL_KEY='wikiWall';
const WIKI=(function(){
  let notes={}, current=null, view='note', edTab='vis', editingId=null;

  function load(){ try{ const raw=localStorage.getItem(KEY); if(raw){ notes=JSON.parse(raw); if(!notes['os-sem-interactive']){ const now=new Date().toISOString().slice(0,16).replace('T',' '); notes['os-sem-interactive']={id:'os-sem-interactive',title:'信号量交互式学习指南',category:'操作系统',updated:now,body:"# 信号量交互式学习指南（OSTEP 第31章）\n\n> 下面原样嵌入了《信号量学习指南》，保留全部图示、配色与交互模拟器，渲染与原文件完全一致。若下方未显示，请确认 `信号量学习指南.html` 与本文件在同一文件夹。\n\n@embed 信号量学习指南.html"}; persist(); } return; } }catch(e){} notes=seed(); persist(); }
  function persist(){ try{ localStorage.setItem(KEY,JSON.stringify(notes)); }catch(e){ toast('⚠ 浏览器存储写入失败，建议导出备份'); } }
  function slug(t){ return (t||'').trim().toLowerCase().replace(/\s+/g,'-').replace(/[^\w一-龥\-]/g,'')||('p'+Date.now()); }
  function idByTitle(title){ const t=(title||'').trim(); for(const id in notes){ if(notes[id].title.trim()===t) return id; } return null; }

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    const BT=String.fromCharCode(96);
    const parts=s.split(new RegExp('('+BT+'[^'+BT+']+'+BT+')','g'));
    return parts.map(seg=>{
      if(seg.length>=2 && seg[0]===BT && seg[seg.length-1]===BT){ return '<code class="inline">'+esc(seg.slice(1,-1))+'</code>'; }
      let t=esc(seg);
      t=t.replace(/\[\[([^\]]+)\]\]/g,(m,x)=>{ x=x.trim(); const ex=idByTitle(x); return '<a class="wlink'+(ex?'':' missing')+'" data-t="'+x.replace(/"/g,'&quot;')+'" onclick="WIKI.goByTitle(this.dataset.t);return false;">'+x+'</a>'; });
      t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,txt,url)=>'<a href="'+url+'" target="_blank" rel="noopener">'+txt+'</a>');
      t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
      t=t.replace(/(^|[^*])\*([^*]+)\*/g,'$1<i>$2</i>');
      return t;
    }).join('');
  }
  function render(md){
    const lines=(md||'').replace(/\r/g,'').split('\n'); const FENCE=String.fromCharCode(96,96,96);
    let html='', i=0;
    const isTableStart=k=>/\|/.test(lines[k]||'') && /^[\s|:\-]+$/.test(lines[k+1]||'') && (lines[k+1]||'').includes('-');
    while(i<lines.length){
      let ln=lines[i];
      if(ln.indexOf(FENCE)===0){ let buf=[]; i++; while(i<lines.length && lines[i].indexOf(FENCE)!==0){ buf.push(lines[i]); i++; } i++; html+='<pre class="code">'+esc(buf.join('\n'))+'</pre>'; continue; }
      if(/^@embed\s+/.test(ln)){ const src=ln.replace(/^@embed\s+/,'').trim(); html+='<iframe class="embed" src="'+src.replace(/"/g,'%22')+'" loading="lazy"></iframe>'; i++; continue; }
      let h=ln.match(/^(#{1,3})\s+(.*)$/);
      if(h){ const lv=h[1].length; html+='<h'+lv+'>'+inline(h[2])+'</h'+lv+'>'; i++; continue; }
      if(/^---+$/.test(ln.trim())){ html+='<hr>'; i++; continue; }
      if(/^>\s?/.test(ln)){ let buf=[]; while(i<lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; } html+='<blockquote>'+inline(buf.join(' '))+'</blockquote>'; continue; }
      if(isTableStart(i)){ const head=ln.split('|').map(x=>x.trim()).filter(x=>x!==''); i+=2; let rows=[]; while(i<lines.length && lines[i].includes('|')){ rows.push(lines[i].split('|').map(x=>x.trim()).filter(x=>x!=='')); i++; } let t='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'; rows.forEach(r=>{ t+='<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; }); html+=t+'</tbody></table>'; continue; }
      if(/^\s*[-*]\s+/.test(ln)){ let buf=[]; while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; } html+='<ul>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ul>'; continue; }
      if(/^\s*\d+\.\s+/.test(ln)){ let buf=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; } html+='<ol>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ol>'; continue; }
      if(ln.trim()===''){ i++; continue; }
      let buf=[ln]; i++;
      while(i<lines.length && lines[i].trim()!=='' && !/^(#{1,3}\s|>|\s*[-*]\s|\s*\d+\.\s|---+$)/.test(lines[i]) && lines[i].indexOf(FENCE)!==0 && !isTableStart(i)){ buf.push(lines[i]); i++; }
      html+='<p>'+buf.map(inline).join('<br>')+'</p>';
    }
    return html;
  }
  function htmlToMd(root){
    function inlineMd(node){ let s=''; node.childNodes.forEach(n=>{ if(n.nodeType===3){ s+=n.nodeValue; return; } if(n.nodeType!==1) return; const tag=n.nodeName.toLowerCase(), inner=inlineMd(n);
      if(tag==='b'||tag==='strong') s+='**'+inner+'**'; else if(tag==='i'||tag==='em') s+='*'+inner+'*';
      else if(tag==='code') s+=String.fromCharCode(96)+n.textContent+String.fromCharCode(96);
      else if(tag==='a') s+='['+inner+']('+(n.getAttribute('href')||'')+')'; else if(tag==='br') s+='\n'; else s+=inner; }); return s; }
    let out='';
    function block(node){ node.childNodes.forEach(n=>{ if(n.nodeType===3){ const t=n.nodeValue.replace(/\s+/g,' ').trim(); if(t) out+=t+'\n\n'; return; } if(n.nodeType!==1) return; const tag=n.nodeName.toLowerCase();
      if(tag==='h1') out+='# '+inlineMd(n).trim()+'\n\n'; else if(tag==='h2') out+='## '+inlineMd(n).trim()+'\n\n'; else if(tag==='h3') out+='### '+inlineMd(n).trim()+'\n\n';
      else if(tag==='ul'){ n.querySelectorAll(':scope > li').forEach(li=>{ out+='- '+inlineMd(li).trim()+'\n'; }); out+='\n'; }
      else if(tag==='ol'){ let k=1; n.querySelectorAll(':scope > li').forEach(li=>{ out+=(k++)+'. '+inlineMd(li).trim()+'\n'; }); out+='\n'; }
      else if(tag==='blockquote'){ out+='> '+inlineMd(n).trim().replace(/\n+/g,' ')+'\n\n'; }
      else if(tag==='pre'){ const F=String.fromCharCode(96,96,96); out+=F+'\n'+n.textContent.replace(/\n+$/,'')+'\n'+F+'\n\n'; }
      else if(tag==='iframe'){ out+='@embed '+(n.getAttribute('src')||'')+'\n\n'; }
      else if(tag==='div'||tag==='p'){ const inner=inlineMd(n).trim(); out+= inner? inner+'\n\n':''; }
      else { const inner=inlineMd(n).trim(); if(inner) out+=inner+'\n\n'; } }); }
    block(root); return out.replace(/\n{3,}/g,'\n\n').trim();
  }

  let selIdx=-1, curResults=[];
  function searchResults(q){ q=(q||'').trim().toLowerCase(); if(!q) return []; const toks=q.split(/\s+/).filter(Boolean); const arr=[];
    Object.values(notes).forEach(n=>{ const tl=n.title.toLowerCase(), bl=(n.body||'').toLowerCase(); let score=0;
      if(tl.includes(q)) score+=120; toks.forEach(t=>{ if(tl.includes(t)) score+=30; let idx=bl.indexOf(t),c=0; while(idx>=0&&c<8){ score+=3; c++; idx=bl.indexOf(t,idx+t.length);} });
      if(score<=0) return; let pos=-1; for(const t of toks){ const p=bl.indexOf(t); if(p>=0&&(pos<0||p<pos)) pos=p; }
      let snip; if(pos<0){ snip=(n.body||'').slice(0,120); } else { const st=Math.max(0,pos-40); snip=(st>0?'…':'')+n.body.slice(st,st+150); }
      arr.push({id:n.id,title:n.title,category:n.category,score,snip}); });
    arr.sort((a,b)=>b.score-a.score); return arr.slice(0,15);
  }
  function hl(text,q){ text=esc(text); const toks=(q||'').trim().toLowerCase().split(/\s+/).filter(Boolean); toks.forEach(t=>{ if(!t) return; const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'); text=text.replace(re,'<mark>$1</mark>'); }); return text; }
  function onSearch(v){ const box=document.getElementById('results'); curResults=searchResults(v); selIdx=-1;
    if(!v.trim()){ box.classList.remove('show'); box.innerHTML=''; renderSidebar(''); return; } renderSidebar(v.trim());
    if(curResults.length===0){ box.innerHTML='<div class="res-empty">没有找到匹配的内容</div>'; box.classList.add('show'); return; }
    box.innerHTML=curResults.map((r,i)=>'<a class="res" data-i="'+i+'" onclick="WIKI.openResult('+i+')"><span class="rt">'+hl(r.title,v)+' <span class="rc">'+esc(r.category||'未分类')+'</span></span><span class="rs">'+hl(r.snip,v)+'</span></a>').join('');
    box.classList.add('show');
  }
  function searchKey(e){ const box=document.getElementById('results'); if(!box.classList.contains('show')) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); selIdx=Math.min(selIdx+1,curResults.length-1); markSel(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); selIdx=Math.max(selIdx-1,0); markSel(); }
    else if(e.key==='Enter'){ e.preventDefault(); openResult(selIdx<0?0:selIdx); }
    else if(e.key==='Escape'){ box.classList.remove('show'); } }
  function markSel(){ document.querySelectorAll('#results .res').forEach((el,i)=>{ el.classList.toggle('sel',i===selIdx); if(i===selIdx) el.scrollIntoView({block:'nearest'}); }); }
  function openResult(i){ if(curResults[i]){ open(curResults[i].id); document.getElementById('results').classList.remove('show'); document.getElementById('search').blur(); } }

  function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderSidebar(filter){ const sb=document.getElementById('sidebar'); const cats={};
    Object.values(notes).forEach(n=>{ if(filter){ const f=filter.toLowerCase(); if(!n.title.toLowerCase().includes(f) && !(n.body||'').toLowerCase().includes(f)) return; } const c=n.category||'未分类'; (cats[c]=cats[c]||[]).push(n); });
    const keys=Object.keys(cats).sort(); if(keys.length===0){ sb.innerHTML='<div class="empty">没有匹配的页面。</div>'; return; }
    let html=''; keys.forEach(c=>{ html+='<div class="cat">'+escAttr(c)+'</div>'; cats[c].sort((a,b)=>a.title.localeCompare(b.title,'zh')).forEach(n=>{ html+='<a class="item'+(n.id===current&&view==='note'?' active':'')+'" onclick="WIKI.open(\''+n.id+'\')"><span class="dot"></span>'+escAttr(n.title)+'</a>'; }); });
    sb.innerHTML=html;
  }
  function showView(v){ view=v; document.getElementById('reader').style.display=v==='note'?'':'none'; document.getElementById('activity').style.display=v==='activity'?'':'none'; }
  function open(id){ if(!notes[id]) return; current=id; showView('note'); const n=notes[id];
    document.getElementById('crumb').innerHTML='<span class="chip">'+escAttr(n.category||'未分类')+'</span> ／ '+escAttr(n.title);
    document.getElementById('pgTitle').textContent=n.title; document.getElementById('pgMeta').textContent=n.updated?('最近更新：'+n.updated):'';
    document.getElementById('pgBody').innerHTML=render(n.body); renderBacklinks(id); renderSidebar(document.getElementById('search').value.trim());
    document.getElementById('main').scrollTop=0; recordVisit(); toggleNav(false);
  }
  function renderBacklinks(id){ const title=notes[id].title.trim(); const refs=Object.values(notes).filter(n=>n.id!==id && new RegExp('\\[\\[\\s*'+title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*\\]\\]').test(n.body||''));
    const box=document.getElementById('backlinks'); box.innerHTML=refs.length?('<h3>链接到本页的笔记</h3>'+refs.map(n=>'<a href="#" onclick="WIKI.open(\''+n.id+'\');return false;">'+escAttr(n.title)+'</a>').join('')):''; }
  function goByTitle(t){ const id=idByTitle(t); if(id) open(id); }
  function cur(){ return current; }

  function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function getVisits(){ try{ return JSON.parse(localStorage.getItem(VIS_KEY)||'{}'); }catch(e){ return {}; } }
  function recordVisit(){ try{ const v=getVisits(); const k=todayStr(); v[k]=(v[k]||0)+1; localStorage.setItem(VIS_KEY,JSON.stringify(v)); }catch(e){} }
  function noteDateMap(){ const m={}; Object.values(notes).forEach(n=>{ const d=(n.updated||'').slice(0,10); if(/^\d{4}-\d{2}-\d{2}$/.test(d)){ m[d]=(m[d]||0)+1; } }); return m; }
  function level(c){ return c<=0?0:c<2?1:c<4?2:c<7?3:4; }
  function buildHeatmap(map){ const today=new Date(); today.setHours(0,0,0,0); const end=new Date(today); const start=new Date(today); start.setDate(start.getDate()-7*52-today.getDay());
    const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']; let cols=[], monthRow=[], lastMonth=-1, total=0, maxc=0, activeDays=0; let d=new Date(start);
    while(d<=end || d.getDay()!==0){ const col=[]; let cfm=-1; for(let r=0;r<7;r++){ const cell=new Date(d); const ds=todayStr(cell); if(cell>today){ col.push({empty:true}); } else { const c=map[ds]||0; col.push({date:ds,c}); if(c>0){activeDays++; total+=c;} if(c>maxc)maxc=c; } if(r===0)cfm=cell.getMonth(); d.setDate(d.getDate()+1); }
      cols.push(col); if(cfm!==lastMonth){ monthRow.push(months[cfm]); lastMonth=cfm; } else monthRow.push(''); if(d>end && d.getDay()===0) break; }
    let streak=0, dd=new Date(today); while(true){ const c=map[todayStr(dd)]||0; if(c>0){streak++; dd.setDate(dd.getDate()-1);} else break; } return {cols,monthRow,total,maxc,activeDays,streak};
  }
  function heatmapHTML(title,hint,map,unit){ const h=buildHeatmap(map); const days=['','一','','三','','五','']; let grid='';
    h.cols.forEach(col=>{ grid+='<div class="hm-col">'+col.map(cell=>{ if(cell.empty) return '<i class="hm-cell empty"></i>'; return '<i class="hm-cell" data-l="'+level(cell.c)+'" title="'+cell.date+'：'+cell.c+' '+unit+'"></i>'; }).join('')+'</div>'; });
    const months=h.monthRow.map(m=>'<span style="width:15px;display:inline-block">'+m+'</span>').join('');
    return '<div class="hm-card"><h3>'+title+'</h3><div class="hint">'+hint+'</div><div class="hm-stats">'+
      '<div class="hm-stat"><b>'+h.activeDays+'</b><span>活跃天数（近一年）</span></div><div class="hm-stat"><b>'+h.total+'</b><span>累计'+unit+'</span></div>'+
      '<div class="hm-stat"><b>'+h.streak+'</b><span>当前连续天数</span></div><div class="hm-stat"><b>'+h.maxc+'</b><span>单日最高</span></div></div>'+
      '<div class="hm-months">'+months+'</div><div class="hm-body"><div class="hm-days">'+days.map(x=>'<span>'+x+'</span>').join('')+'</div><div class="hm-grid">'+grid+'</div></div>'+
      '<div class="hm-legend">少 <i style="background:var(--hm0)"></i><i style="background:var(--hm1)"></i><i style="background:var(--hm2)"></i><i style="background:var(--hm3)"></i><i style="background:var(--hm4)"></i> 多</div></div>';
  }
  function showActivity(){ showView('activity'); current=null; renderSidebar(document.getElementById('search').value.trim());
    document.getElementById('activity').innerHTML='<h1>📊 使用活跃度</h1><div class="sub">格子颜色越深代表当天越活跃（类似 GitHub / OJ 的贡献图）。</div>'+
      heatmapHTML('🔥 我的访问活跃度','记录这台设备每天打开 / 阅读笔记的次数（仅本机统计）。',getVisits(),'次')+
      heatmapHTML('📝 笔记更新活跃度','按每篇笔记最近更新的日期统计。',noteDateMap(),'篇');
    document.getElementById('main').scrollTop=0; toggleNav(false);
  }

  const PRESETS=['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#30cfd0,#330867)','linear-gradient(135deg,#a8edea,#fed6e3)','linear-gradient(160deg,#0f2027,#203a43,#2c5364)'];
  function getWall(){ try{ return JSON.parse(localStorage.getItem(WALL_KEY)||'null')||{type:'none',value:'',blur:0,dim:82}; }catch(e){ return {type:'none',value:'',blur:0,dim:82}; } }
  function saveWall(w){ try{ localStorage.setItem(WALL_KEY,JSON.stringify(w)); }catch(e){ toast('图片过大，无法保存到本机存储'); } }
  function applyWall(w){ const layer=document.getElementById('wallLayer'), dim=document.getElementById('wallDim');
    if(w.type==='none'||!w.value){ layer.style.backgroundImage=''; layer.style.background=''; dim.style.opacity='1'; layer.style.filter=''; return; }
    if(w.type==='preset'){ layer.style.background=w.value; layer.style.backgroundImage=''; } else { layer.style.background=''; layer.style.backgroundImage='url("'+w.value.replace(/"/g,'%22')+'")'; }
    layer.style.filter='blur('+(w.blur||0)+'px)'; dim.style.opacity=((100-(w.dim==null?82:w.dim))/100).toString();
  }
  function refreshWallUI(){ const w=getWall(); document.querySelectorAll('#wallType button').forEach(b=>b.classList.toggle('on',b.dataset.t===w.type));
    document.getElementById('presetField').style.display=w.type==='preset'?'':'none'; document.getElementById('urlField').style.display=w.type==='url'?'':'none'; document.getElementById('imgField').style.display=w.type==='image'?'':'none';
    document.getElementById('blur').value=w.blur||0; document.getElementById('blurVal').textContent=(w.blur||0)+'px'; document.getElementById('dim').value=(w.dim==null?82:w.dim); document.getElementById('dimVal').textContent=(w.dim==null?82:w.dim)+'%';
    document.getElementById('presets').innerHTML=PRESETS.map((p,i)=>'<div class="preset'+(w.type==='preset'&&w.value===p?' on':'')+'" style="background:'+p+'" onclick="WIKI.setPreset('+i+')"></div>').join(''); if(w.type==='url') document.getElementById('wallUrl').value=w.value||'';
  }
  function openSettings(){ refreshWallUI(); document.getElementById('ovl').classList.add('show'); document.getElementById('drawer').classList.add('show'); }
  function closeSettings(){ document.getElementById('ovl').classList.remove('show'); document.getElementById('drawer').classList.remove('show'); }
  function setWallType(t){ const w=getWall(); w.type=t; if(t==='none')w.value=''; saveWall(w); applyWall(w); refreshWallUI(); }
  function setPreset(i){ const w=getWall(); w.type='preset'; w.value=PRESETS[i]; saveWall(w); applyWall(w); refreshWallUI(); }
  function setWallUrl(v){ const w=getWall(); w.type='url'; w.value=v.trim(); saveWall(w); applyWall(w); }
  function setWallImage(file){ if(!file) return; const r=new FileReader(); r.onload=e=>{ const w=getWall(); w.type='image'; w.value=e.target.result; saveWall(w); applyWall(w); toast('✓ 壁纸已设置'); }; r.readAsDataURL(file); }
  function setBlur(v){ const w=getWall(); w.blur=+v; saveWall(w); applyWall(w); document.getElementById('blurVal').textContent=v+'px'; }
  function setDim(v){ const w=getWall(); w.dim=+v; saveWall(w); applyWall(w); document.getElementById('dimVal').textContent=v+'%'; }
  function resetWall(){ const w={type:'none',value:'',blur:0,dim:82}; saveWall(w); applyWall(w); refreshWallUI(); toast('已恢复默认背景'); }

  function openEditor(id){ editingId=id&&notes[id]?id:null; const n=editingId?notes[editingId]:{title:'',category:'',body:''};
    document.getElementById('edTitle').value=n.title||''; document.getElementById('edCat').value=n.category||''; document.getElementById('mdsrc').value=n.body||'';
    document.getElementById('edDelete').style.display=editingId?'':'none'; switchTab('vis'); document.getElementById('modal').classList.add('show'); toggleNav(false);
  }
  function closeEditor(){ document.getElementById('modal').classList.remove('show'); }
  function switchTab(t){ const wys=document.getElementById('wys'), md=document.getElementById('mdsrc');
    if(t==='vis'){ wys.innerHTML=render(md.value); wys.style.display=''; md.style.display='none'; document.getElementById('tabVis').classList.add('on'); document.getElementById('tabMd').classList.remove('on'); document.getElementById('toolbar').style.display='flex'; }
    else { md.value=htmlToMd(wys); wys.style.display='none'; md.style.display=''; document.getElementById('tabMd').classList.add('on'); document.getElementById('tabVis').classList.remove('on'); document.getElementById('toolbar').style.display='none'; }
    edTab=t;
  }
  function currentMd(){ return edTab==='vis'?htmlToMd(document.getElementById('wys')):document.getElementById('mdsrc').value; }
  function fmt(cmd){ document.execCommand(cmd,false,null); document.getElementById('wys').focus(); }
  function fmtBlock(tag){ document.execCommand('formatBlock',false,tag); document.getElementById('wys').focus(); }
  function wrapCode(){ const s=window.getSelection(); if(!s.rangeCount||s.isCollapsed){ document.execCommand('insertHTML',false,'<code>代码</code>'); return; } document.execCommand('insertHTML',false,'<code>'+s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</code>'); }
  function makeLink(){ const url=prompt('链接地址（站内笔记请直接在正文用 [[标题]]）：','https://'); if(url) document.execCommand('createLink',false,url); }
  function saveEdit(){ const title=document.getElementById('edTitle').value.trim(); if(!title){ toast('请填写标题'); return; }
    const cat=document.getElementById('edCat').value.trim()||'未分类'; const body=currentMd(); const now=new Date().toISOString().slice(0,16).replace('T',' '); let id=editingId;
    if(id){ notes[id].title=title; notes[id].category=cat; notes[id].body=body; notes[id].updated=now; } else { id=slug(title); while(notes[id]) id+='-'+Math.floor(Math.random()*1000); notes[id]={id,title,category:cat,body,updated:now}; }
    persist(); closeEditor(); open(id); toast('✓ 已保存');
  }
  function deleteCurrent(){ if(!editingId) return; if(!confirm('确定删除「'+notes[editingId].title+'」？此操作不可撤销。')) return; delete notes[editingId]; persist(); closeEditor(); const ids=Object.keys(notes); current=null; if(ids.length) open(notes['home']?'home':ids[0]); else renderSidebar(''); toast('已删除'); }

  function exportData(){ const blob=new Blob([JSON.stringify(notes,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='我的学习Wiki备份-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href); toast('✓ 已导出备份'); }
  function importData(file){ if(!file) return; const r=new FileReader(); r.onload=e=>{ try{ const data=JSON.parse(e.target.result); if(typeof data!=='object') throw 0; if(!confirm('导入将合并/覆盖同名页面，继续吗？')) return; Object.assign(notes,data); persist(); const ids=Object.keys(notes); if(ids.length) open(ids[0]); toast('✓ 导入成功'); }catch(err){ toast('⚠ 文件格式不正确'); } }; r.readAsText(file); }

  function applyThemeIcon(){ document.getElementById('themeBtn').textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'; }
  function toggleTheme(){ const c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',c); try{localStorage.setItem('wikiTheme',c);}catch(e){} applyThemeIcon(); }
  function toggleNav(force){ const w=document.getElementById('wrap'); if(force===false){w.classList.remove('open');return;} if(force===true){w.classList.add('open');return;} w.classList.toggle('open'); }
  let toastTimer; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }

  function seed(){ const now=new Date().toISOString().slice(0,16).replace('T',' '); const mk=(id,title,category,body)=>({id,title,category,body,updated:now}); const data={};
    [
      mk('home','首页','开始',"# 欢迎来到我的学习 Wiki 👋\n\n这是一个**完全属于你**的本地知识库，所有笔记保存在你浏览器里。\n\n## 快速上手\n- 右上角 **＋ 新建** 写笔记（支持**可视化富文本**和 **Markdown** 两种模式）\n- 顶部**强力搜索**，输入即出结果、可上下键选择\n- 📊 查看**活跃度格子图**；🎨 设置**壁纸/外观**；🌙 切换明暗主题\n- 页面互链：[[操作系统：信号量]]\n\n> 先读 [[使用说明]]。"),
      mk('guide','使用说明','开始',"# 使用说明\n\n## 编辑（两种模式）\n点 **＋ 新建** 或 **✎ 编辑**。编辑器有两个标签：\n- **可视化**：像 Word 一样，用工具栏加粗、标题、列表、引用、代码、链接。\n- **Markdown**：直接写源码。两种随时切换，保存的都是 Markdown。\n\n## 搜索\n顶部搜索框全文检索标题与正文，结果带高亮片段，方向键选择、回车打开。\n\n## 活跃度\n点 📊：上面是**本机访问热力图**，下面是**笔记更新热力图**。\n\n## 壁纸 / 外观\n点 🎨：可选预设、图片链接或本地上传壁纸，并调模糊与压暗。右上角 🌙 切换明暗。\n\n## 备份\n清浏览器数据会清空笔记，记得常点 ⬇ 导出备份；换设备点 ⬆ 导入。"),
      mk('md','Markdown 速查','开始',"# Markdown 速查\n\n## 标题\n用 # 号开头（# 到 ###）。\n\n## 强调\n- 两个星号**加粗**\n- 一个星号*斜体*\n- 反引号 `行内代码`\n\n## 列表与引用\n短横线做无序列表；数字加点做有序列表；行首 > 做引用。\n\n## 代码块\n三个反引号包住整段代码。\n\n## 链接\n外链用中括号+圆括号；站内互链用双方括号包标题，如 [[操作系统：信号量]]。\n\n## 表格\n| 列A | 列B |\n| --- | --- |\n| 1 | 2 |"),
      mk('os-sem','操作系统：信号量','操作系统',"# 操作系统：信号量 (Semaphore)\n\n> 示例笔记。\n\n## 一句话定义\n信号量是一个**带整数值的对象**，配两个原子操作：sem_wait（值减 1，小于 0 就睡）和 sem_post（值加 1，有人睡就唤醒一个）。\n\n## 关键恒等式\n当信号量的值为负时，**它的绝对值 = 正在等待的线程数**。\n\n## 初值速查\n| 用途 | 初值 | 含义 |\n| --- | --- | --- |\n| 作锁（互斥） | 1 | 一个名额 |\n| 作条件变量 | 0 | 没名额，需等别人 post |\n| 生产者 empty | MAX | 初始空位数 |\n| 生产者 full | 0 | 初始没有数据 |"),
      mk('os-sem-interactive','信号量交互式学习指南','操作系统',"# 信号量交互式学习指南（OSTEP 第31章）\n\n> 下面原样嵌入了《信号量学习指南》，保留全部图示、配色与交互模拟器，渲染与原文件完全一致。若下方未显示，请确认 `信号量学习指南.html` 与本文件在同一文件夹。\n\n@embed 信号量学习指南.html")
    ].forEach(n=>data[n.id]=n); return data;
  }

  function init(){ applyThemeIcon(); applyWall(getWall()); load();
    document.addEventListener('keydown',e=>{ if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA' && !document.getElementById('wys').contains(document.activeElement)){ e.preventDefault(); document.getElementById('search').focus(); } });
    document.addEventListener('click',e=>{ if(!e.target.closest('.searchbox')) document.getElementById('results').classList.remove('show'); });
    const ids=Object.keys(notes); if(ids.length){ open(notes['home']?'home':ids[0]); } else { renderSidebar(''); openEditor(null); }
  }
  return { init, open, goByTitle, cur, onSearch, searchKey, openResult, showActivity, openSettings, closeSettings, setWallType, setPreset, setWallUrl, setWallImage, setBlur, setDim, resetWall, openEditor, closeEditor, switchTab, fmt, fmtBlock, wrapCode, makeLink, saveEdit, deleteCurrent, exportData, importData, toggleTheme, toggleNav };
})();
document.addEventListener('DOMContentLoaded', WIKI.init);
</script>
