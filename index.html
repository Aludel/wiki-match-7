<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的学习 Wiki</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1f2430; --muted:#64748b;
    --accent:#4f46e5; --accent-soft:#eef0ff; --line:#e5e7eb; --green:#16a34a;
    --red:#dc2626; --code-bg:#1e293b; --code-ink:#e2e8f0; --radius:12px;
    --shadow:0 4px 18px rgba(20,30,60,.08);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.7; font-size:15.5px; display:flex; flex-direction:column;
  }
  header.top{
    display:flex; align-items:center; gap:14px; padding:10px 18px; background:var(--panel);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
  }
  header.top .logo{font-weight:800; font-size:17px; color:var(--accent); white-space:nowrap;}
  header.top .logo span{color:var(--ink);}
  header.top .spacer{flex:1}
  .searchbox{position:relative; flex:1; max-width:420px;}
  .searchbox input{width:100%; padding:8px 12px 8px 34px; border:1px solid var(--line); border-radius:9px; font-size:14px;}
  .searchbox::before{content:"\1F50D"; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:13px; opacity:.6;}
  a.editlink{font-size:13.5px; font-weight:600; color:var(--accent); background:var(--accent-soft); padding:8px 13px; border-radius:9px; text-decoration:none; white-space:nowrap;}
  a.editlink:hover{background:#e0e3ff;}
  .wrap{display:flex; flex:1; min-height:0;}
  nav.side{
    width:268px; flex:0 0 268px; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:14px 10px 40px;
  }
  nav.side .cat{font-size:12px; letter-spacing:.06em; color:var(--muted); text-transform:uppercase; margin:16px 10px 4px; font-weight:700;}
  nav.side a.item{
    display:flex; align-items:center; gap:8px; padding:7px 12px; color:var(--ink); text-decoration:none;
    border-radius:8px; font-size:14px; cursor:pointer; transition:.12s;
  }
  nav.side a.item:hover{background:var(--accent-soft);}
  nav.side a.item.active{background:var(--accent); color:#fff;}
  nav.side a.item .dot{font-size:11px; opacity:.5;}
  nav.side .empty{color:var(--muted); font-size:13px; padding:10px 12px;}
  main.content{flex:1; min-width:0; overflow-y:auto; padding:30px 46px 90px;}
  article{max-width:820px;}
  .meta{color:var(--muted); font-size:13px; margin-bottom:6px;}
  .crumb{color:var(--muted); font-size:13px;}
  .crumb b{color:var(--accent);}
  article h1{font-size:28px; margin:6px 0 14px; line-height:1.3;}
  article h2{font-size:21px; margin:26px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line);}
  article h3{font-size:17px; margin:20px 0 6px; color:var(--accent);}
  article p{margin:11px 0;}
  article ul,article ol{padding-left:24px; margin:10px 0;}
  article li{margin:4px 0;}
  article blockquote{margin:14px 0; padding:8px 16px; background:var(--accent-soft); border-left:4px solid var(--accent); border-radius:8px; color:#334155;}
  article code.inline{background:#eef0ff; color:var(--accent); padding:1px 6px; border-radius:5px; font-size:14px; font-family:ui-monospace,Menlo,Consolas,monospace;}
  article pre.code{background:var(--code-bg); color:var(--code-ink); padding:14px 16px; border-radius:10px; overflow-x:auto; font-size:13.5px; line-height:1.6; font-family:ui-monospace,Menlo,Consolas,monospace;}
  article a{color:var(--accent); text-decoration:none; border-bottom:1px solid transparent;}
  article a:hover{border-bottom-color:var(--accent);}
  article a.wlink{background:var(--accent-soft); padding:1px 6px; border-radius:5px; font-weight:600;}
  article a.wlink.missing{background:#fef2f2; color:var(--red);}
  article hr{border:none; border-top:1px dashed var(--line); margin:24px 0;}
  article table{border-collapse:collapse; width:100%; margin:14px 0; font-size:14px;}
  article th{background:var(--accent-soft); color:var(--accent); padding:7px 10px; text-align:left; border:1px solid var(--line);}
  article td{padding:6px 10px; border:1px solid var(--line);}
  .backlinks{margin-top:40px; padding-top:16px; border-top:1px solid var(--line);}
  .backlinks h3{font-size:14px; color:var(--muted); margin:0 0 8px;}
  .backlinks a{display:inline-block; margin:0 8px 6px 0; font-size:13.5px; color:var(--accent); text-decoration:none;}
  .notice{max-width:680px; margin:40px auto; padding:22px 24px; background:#fffbeb; border:1px solid #fcd34d; border-radius:12px; color:#854d0e; line-height:1.8;}
  .notice b{color:#92400e;}
  .notice code{background:#fef3c7; padding:1px 6px; border-radius:5px;}
  @media(max-width:820px){
    nav.side{display:none;} main.content{padding:20px 16px 70px;}
    header.top{flex-wrap:wrap;}
  }
</style>
</head>
<body>
<header class="top">
  <div class="logo">📚 我的学习 <span>Wiki</span></div>
  <div class="searchbox"><input id="search" type="text" placeholder="搜索标题或内容…" oninput="WIKI.search(this.value)"></div>
  <div class="spacer"></div>
  <a class="editlink" id="editLink" href="#" onclick="WIKI.edit();return false;">✎ 编辑内容</a>
</header>

<div class="wrap">
  <nav class="side" id="sidebar"></nav>
  <main class="content">
    <article id="reader">
      <div class="crumb" id="crumb"></div>
      <h1 id="pgTitle"></h1>
      <div class="meta" id="pgMeta"></div>
      <div id="pgBody"></div>
      <div class="backlinks" id="backlinks"></div>
    </article>
  </main>
</div>

<script>
/* ============================================================
   配置：部署到 GitHub 后，把下面这行的网址改成你仓库里
   notes.md 的「编辑页」地址，例如：
   https://github.com/你的用户名/仓库名/edit/main/notes.md
   填好后，右上角「✎ 编辑内容」就能一键跳到编辑页。
   先留空也没关系，点它会显示操作提示。
   ============================================================ */
const EDIT_URL = "";

const WIKI = (function(){
  let notes = {};
  let current = null;

  /* ---------- 解析 notes.md（按 ::: 分节） ---------- */
  function parse(text){
    const out={};
    const lines=text.replace(/\r/g,'').split('\n');
    const FENCE=String.fromCharCode(96,96,96);
    let cur=null, buf=[], inFence=false;
    const flush=()=>{ if(cur){ cur.body=buf.join('\n').trim(); out[cur.id]=cur; } };
    const hdr=/^:::\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*$/;
    for(const ln of lines){
      if(ln.indexOf(FENCE)===0){ inFence=!inFence; if(cur) buf.push(ln); continue; }  // 代码块内不解析 :::
      const m = inFence ? null : ln.match(hdr);
      if(m){ flush(); cur={id:m[1].trim(), title:m[2].trim(), category:m[3].trim()}; buf=[]; }
      else if(cur){ buf.push(ln); }
    }
    flush();
    return out;
  }

  function idByTitle(title){
    const t=(title||'').trim();
    for(const id in notes){ if(notes[id].title.trim()===t) return id; }
    return null;
  }

  /* ---------- Markdown 渲染（无占位符，按代码片段切分） ---------- */
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    const BT=String.fromCharCode(96);
    const parts=s.split(new RegExp('('+BT+'[^'+BT+']+'+BT+')','g'));
    return parts.map(seg=>{
      if(seg.length>=2 && seg[0]===BT && seg[seg.length-1]===BT){
        return '<code class="inline">'+esc(seg.slice(1,-1))+'</code>';
      }
      let t=esc(seg);
      t=t.replace(/\[\[([^\]]+)\]\]/g,(m,x)=>{
        x=x.trim(); const ex=idByTitle(x);
        return '<a class="wlink'+(ex?'':' missing')+'" data-t="'+x.replace(/"/g,'&quot;')+'" onclick="WIKI.goByTitle(this.dataset.t);return false;">'+x+'</a>';
      });
      t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,txt,url)=>'<a href="'+url+'" target="_blank" rel="noopener">'+txt+'</a>');
      t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
      t=t.replace(/(^|[^*])\*([^*]+)\*/g,'$1<i>$2</i>');
      return t;
    }).join('');
  }
  function render(md){
    const lines=(md||'').replace(/\r/g,'').split('\n');
    const FENCE=String.fromCharCode(96,96,96);
    let html='', i=0;
    const isTableStart=k=>/\|/.test(lines[k]||'') && /^[\s|:\-]+$/.test(lines[k+1]||'') && (lines[k+1]||'').includes('-');
    while(i<lines.length){
      let ln=lines[i];
      if(ln.indexOf(FENCE)===0){
        let buf=[]; i++;
        while(i<lines.length && lines[i].indexOf(FENCE)!==0){ buf.push(lines[i]); i++; }
        i++;
        html+='<pre class="code">'+esc(buf.join('\n'))+'</pre>'; continue;
      }
      let h=ln.match(/^(#{1,3})\s+(.*)$/);
      if(h){ const lv=h[1].length; html+='<h'+lv+'>'+inline(h[2])+'</h'+lv+'>'; i++; continue; }
      if(/^---+$/.test(ln.trim())){ html+='<hr>'; i++; continue; }
      if(/^>\s?/.test(ln)){
        let buf=[];
        while(i<lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; }
        html+='<blockquote>'+inline(buf.join(' '))+'</blockquote>'; continue;
      }
      if(isTableStart(i)){
        const head=ln.split('|').map(x=>x.trim()).filter(x=>x!=='');
        i+=2; let rows=[];
        while(i<lines.length && lines[i].includes('|')){ rows.push(lines[i].split('|').map(x=>x.trim()).filter(x=>x!=='')); i++; }
        let t='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>';
        rows.forEach(r=>{ t+='<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; });
        html+=t+'</tbody></table>'; continue;
      }
      if(/^\s*[-*]\s+/.test(ln)){
        let buf=[];
        while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
        html+='<ul>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ul>'; continue;
      }
      if(/^\s*\d+\.\s+/.test(ln)){
        let buf=[];
        while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
        html+='<ol>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ol>'; continue;
      }
      if(ln.trim()===''){ i++; continue; }
      let buf=[ln]; i++;
      while(i<lines.length && lines[i].trim()!=='' && !/^(#{1,3}\s|>|\s*[-*]\s|\s*\d+\.\s|---+$)/.test(lines[i]) && lines[i].indexOf(FENCE)!==0 && !isTableStart(i)){ buf.push(lines[i]); i++; }
      html+='<p>'+buf.map(inline).join('<br>')+'</p>';
    }
    return html;
  }

  /* ---------- 界面 ---------- */
  function escAttr(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderSidebar(filter){
    const sb=document.getElementById('sidebar');
    const cats={};
    Object.values(notes).forEach(n=>{
      if(filter){
        const f=filter.toLowerCase();
        if(!n.title.toLowerCase().includes(f) && !(n.body||'').toLowerCase().includes(f)) return;
      }
      const c=n.category||'未分类';
      (cats[c]=cats[c]||[]).push(n);
    });
    const keys=Object.keys(cats).sort();
    if(keys.length===0){ sb.innerHTML='<div class="empty">没有匹配的页面。</div>'; return; }
    let html='';
    keys.forEach(c=>{
      html+='<div class="cat">'+escAttr(c)+'</div>';
      cats[c].forEach(n=>{
        html+='<a class="item'+(n.id===current?' active':'')+'" onclick="WIKI.open(\''+n.id+'\')"><span class="dot">●</span>'+escAttr(n.title)+'</a>';
      });
    });
    sb.innerHTML=html;
  }
  function open(id){
    if(!notes[id]) return;
    current=id;
    const n=notes[id];
    document.getElementById('crumb').innerHTML='<b>'+escAttr(n.category||'未分类')+'</b> ／ '+escAttr(n.title);
    document.getElementById('pgTitle').textContent=n.title;
    document.getElementById('pgMeta').textContent='';
    document.getElementById('pgBody').innerHTML=render(n.body);
    renderBacklinks(id);
    renderSidebar(document.getElementById('search').value.trim());
    document.querySelector('main.content').scrollTop=0;
    if(history && history.replaceState) history.replaceState(null,'','#'+encodeURIComponent(id));
  }
  function renderBacklinks(id){
    const title=notes[id].title.trim();
    const refs=Object.values(notes).filter(n=>n.id!==id && new RegExp('\\[\\[\\s*'+title.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*\\]\\]').test(n.body||''));
    const box=document.getElementById('backlinks');
    if(refs.length===0){ box.innerHTML=''; return; }
    box.innerHTML='<h3>🔗 链接到本页的笔记</h3>'+refs.map(n=>'<a href="#" onclick="WIKI.open(\''+n.id+'\');return false;">'+escAttr(n.title)+'</a>').join('');
  }
  function goByTitle(t){ const id=idByTitle(t); if(id) open(id); }
  function search(v){ renderSidebar(v.trim()); }
  function edit(){
    if(EDIT_URL){ window.open(EDIT_URL,'_blank','noopener'); }
    else { alert('编辑方法：到你的 GitHub 仓库打开 notes.md，点铅笔图标在线编辑后 Commit。\n\n（提示：把本文件顶部的 EDIT_URL 设成你的 notes.md 编辑地址后，这个按钮就能一键跳转。）'); }
  }

  /* ---------- 启动：加载 notes.md ---------- */
  function showError(msg){
    document.querySelector('main.content').innerHTML='<div class="notice">'+msg+'</div>';
  }
  function start(){
    fetch('notes.md?_='+Date.now())
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
      .then(txt=>{
        notes=parse(txt);
        const ids=Object.keys(notes);
        if(ids.length===0){ showError('<b>notes.md 是空的或格式不对。</b><br>请检查每篇笔记是否以 <code>::: id | 标题 | 分类</code> 开头。'); return; }
        renderSidebar('');
        // 支持用 #id 直接打开某页
        const hash=decodeURIComponent((location.hash||'').replace(/^#/,''));
        open(notes[hash]?hash:(notes['home']?'home':ids[0]));
      })
      .catch(err=>{
        showError('<b>无法加载内容文件 notes.md。</b><br><br>'+
          '如果你是<b>直接双击本地的 index.html</b> 打开的，浏览器出于安全限制不允许读取本地文件，这是正常现象。<br><br>'+
          '✅ 正确用法：把 <code>index.html</code> 和 <code>notes.md</code> 一起上传到 GitHub Pages，再通过<b>网址</b>访问，就能正常显示。<br><br>'+
          '（如需在本地预览，可在该文件夹运行一个本地服务器，例如 <code>python -m http.server</code>，再打开 http://localhost:8000 ）<br><br>'+
          '<span style="color:#92400e;font-size:13px">技术细节：'+escAttr(String(err.message||err))+'</span>');
      });
  }

  return { open, goByTitle, search, edit, start };
})();

document.addEventListener('DOMContentLoaded', WIKI.start);
</script>
</body>
</html>
